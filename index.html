function routeBBox(coords,radiusMi){
  const lats=coords.map(c=>c.lat),lngs=coords.map(c=>c.lng),mid=(Math.min(...lats)+Math.max(...lats))/2;
  const latPad=radiusMi/69, lngPad=radiusMi/(69*Math.max(.25,Math.cos(mid*Math.PI/180)));
  return {s:Math.min(...lats)-latPad,w:Math.min(...lngs)-lngPad,n:Math.max(...lats)+latPad,e:Math.max(...lngs)+lngPad};
}
function routePartName(pct){return pct<.33?"beginning":pct>.67?"toward end":"middle";}
function pointRouteProjection(p,coords){
  const R=111320, lat0=p.lat*Math.PI/180;
  const xy=q=>({x:q.lng*R*Math.cos(lat0),y:q.lat*R});
  const pp=xy(p);
  let best={dist:Infinity,along:0},cum=0;
  for(let i=0;i<coords.length-1;i++){
    const a=xy(coords[i]),b=xy(coords[i+1]);
    const vx=b.x-a.x,vy=b.y-a.y,len2=vx*vx+vy*vy,len=Math.sqrt(len2)||0;
    let t=len2?((pp.x-a.x)*vx+(pp.y-a.y)*vy)/len2:0;t=Math.max(0,Math.min(1,t));
    const cx=a.x+t*vx,cy=a.y+t*vy,dist=Math.hypot(pp.x-cx,pp.y-cy);
    if(dist<best.dist)best={dist,along:cum+(len*t)};
    cum+=len;
  }
  best.total=cum;best.pct=cum?best.along/cum:0;
  return best;
}
function osmParts(q,box){
  return q.split(";").map(x=>x.trim()).filter(Boolean).map(x=>`${x}(${box.s.toFixed(5)},${box.w.toFixed(5)},${box.n.toFixed(5)},${box.e.toFixed(5)});`).join("");
}
function routeSlice(coords,section){
  if(section==="any")return coords;
  const withD=[];let total=0;
  for(let i=0;i<coords.length;i++){
    if(i>0)total+=haversine(coords[i-1],coords[i]);
    withD.push({p:coords[i],d:total});
  }
  const lo=section==="start"?0:section==="middle"?.33:.67;
  const hi=section==="start"?.33:section==="middle"?.67:1;
  return withD.filter(x=>!total||(x.d/total)>=lo&&(x.d/total)<=hi).map(x=>x.p);
}
function sampledRoutePoints(coords,radiusMi,section){
  const slice=routeSlice(coords,section);
  if(!slice.length)return coords.slice(0,1);
  const spacing=Math.max(1609.34*2.5,radiusMi*1609.34*1.35); // dense enough for 3 mi searches without creating huge OSM queries
  const maxPts=section==="any"?64:32;
  const out=[slice[0]];let carry=0;
  for(let i=1;i<slice.length;i++){
    const seg=haversine(slice[i-1],slice[i]);
    carry+=seg;
    if(carry>=spacing){out.push(slice[i]);carry=0;}
  }
  out.push(slice[slice.length-1]);
  // Cap extremely long routes by evenly thinning samples rather than sending one giant bounding-box query.
  if(out.length>maxPts){
    const thin=[];
    for(let i=0;i<maxPts;i++)thin.push(out[Math.round(i*(out.length-1)/(maxPts-1))]);
    return thin;
  }
  return out;
}
function osmAroundParts(q,pts,radiusMeters){
  const selectors=q.split(";").map(x=>x.trim()).filter(Boolean);
  const chunks=[];
  pts.forEach(p=>selectors.forEach(sel=>chunks.push(`${sel}(around:${Math.round(radiusMeters)},${p.lat.toFixed(5)},${p.lng.toFixed(5)});`)));
  return chunks.join("");
}
function geoSamplePoints(coords,radiusMi,section){
  const pts=sampledRoutePoints(coords,radiusMi,section);
  const maxPts=section==="any"?26:16;
  if(pts.length<=maxPts)return pts;
  const thin=[];
  for(let i=0;i<maxPts;i++)thin.push(pts[Math.round(i*(pts.length-1)/(maxPts-1))]);
  return thin;
}
async function geoapifyPlacesAlongRoute(cat,pts,radiusMeters,progress){
  const key=geoapifyKey();
  if(!key||!cat.geo)throw new Error("missing Geoapify key");
  const all=[];const seen=new Set();
  const passes=[cat.geo,cat.geoBroad].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);
  for(let pass=0;pass<passes.length;pass++){
    const categories=passes[pass];
    for(let i=0;i<pts.length;i++){
      if(progress)progress(`Searching route area ${i+1} of ${pts.length}${pass?" with broader categories":""}…`);
      const p=pts[i];
      const url=`https://api.geoapify.com/v2/places?categories=${encodeURIComponent(categories)}&filter=circle:${p.lng.toFixed(6)},${p.lat.toFixed(6)},${Math.round(radiusMeters)}&bias=proximity:${p.lng.toFixed(6)},${p.lat.toFixed(6)}&limit=30&lang=en&apiKey=${encodeURIComponent(key)}`;
      const r=await fetch(url);
      const d=await r.json();
      if(!r.ok||d.error)throw new Error((d&&d.message)||`Geoapify places HTTP ${r.status}`);
      (d.features||[]).forEach(f=>{
        const place=geoapifyFeatureToPlace(f,cat);
        if(!place)return;
        const keyId=(f.properties&&f.properties.place_id)||`${place.name}_${place.lat.toFixed(5)}_${place.lng.toFixed(5)}`;
        if(seen.has(keyId))return;
        seen.add(keyId);all.push(place);
      });
    }
    if(all.length)break;
  }
  return all;
}
async function overpassAlongRoute(cat,pts,radiusMeters,progress){
  const all=[];
  const seen=new Set();
  const maxPtsPerQuery=12;
  const batches=[];
  for(let i=0;i<pts.length;i+=maxPtsPerQuery)batches.push(pts.slice(i,i+maxPtsPerQuery));
  for(let i=0;i<batches.length;i++){
    if(progress)progress(`Searching route area ${i+1} of ${batches.length}…`);
    const query=`[out:json][timeout:18];(${osmAroundParts(cat.q,batches[i],radiusMeters)});out tags center 120;`;
    const data=await overpass(query);
    (data.elements||[]).forEach(e=>{
      const la=e.lat||(e.center&&e.center.lat),ln=e.lon||(e.center&&e.center.lon);
      if(la==null||ln==null)return;
      const key=(e.type||"n")+":"+(e.id||`${la.toFixed(5)},${ln.toFixed(5)}`);
      if(seen.has(key))return;
      seen.add(key);all.push(e);
    });
  }
  return all;
}
async function loadAlongRoute(box,catKey,radiusMi,section,forceOsm=false){
  if(!tripRoute){box.innerHTML='<div class="hint">Build a route first.</div>';return;}
  const cat=ROUTE_CATS.find(c=>c.key===catKey)||ROUTE_CATS[0];
  const max=radiusMi*1609.34;
  if(!hasFoursquare()&&!hasGeoapify()&&!forceOsm){
    box.innerHTML=`<div class="hint"><b>Search along route</b><br>Open Maps for the fastest nearby results, or run the in-app route search here.<br><br><button class="tinybtn primary" id="routeTryOsm">Search here</button></div>`;
    const osm=box.querySelector("#routeTryOsm");if(osm)osm.onclick=()=>loadAlongRoute(box,catKey,radiusMi,section,true);
    
    return;
  }
  const usingFsq=hasFoursquare();
  const usingGeo=!usingFsq&&hasGeoapify()&&cat.geo;
  const searchPts=(usingFsq||usingGeo)?geoSamplePoints(tripRoute.coords,radiusMi,section):sampledRoutePoints(tripRoute.coords,radiusMi,section);
  const status=msg=>{box.innerHTML=`<div class="hint"><span class="spin"></span>${msg}</div><div class="route-search-progress">Checking ${searchPts.length} route areas, then filtering to places within ${radiusMi} miles of the route.</div>`;};
  status(`Searching ${cat.label.toLowerCase()} within ${radiusMi} miles of the ${section==="any"?"route":routePartName(section==="start"?.1:section==="middle"?.5:.9)}…`);
  try{
    let rawPlaces=[];
    if(usingFsq){
      try{rawPlaces=await foursquarePlacesAlongRoute(cat,searchPts,max,status);}catch(fsqErr){console.warn("Route places failed",fsqErr);rawPlaces=[];}
    }
    if(!rawPlaces.length&&usingGeo){
      try{rawPlaces=await geoapifyPlacesAlongRoute(cat,searchPts,max,status);}catch(geoErr){console.warn("Route places failed",geoErr);rawPlaces=[];}
    }
    if(!rawPlaces.length&&!usingFsq&&!usingGeo){
      const elements=await overpassAlongRoute(cat,searchPts,max,status);
      rawPlaces=elements.map(e=>{const la=e.lat||(e.center&&e.center.lat),ln=e.lon||(e.center&&e.center.lon);return la==null||ln==null?null:{name:(e.tags&&e.tags.name)||cat.label,lat:la,lng:ln,tags:e.tags||{},source:"Places"};}).filter(Boolean);
    }
    if(!rawPlaces.length&&(usingFsq||usingGeo)){
      box.innerHTML=`<div class="hint">No ${cat.label.toLowerCase()} found from ${providerLabel} within ${radiusMi} miles of that route section. Try “Any section,” increase the distance, or use the public OSM fallback from nearby store search.</div>`;
      return;
    }
    let items=rawPlaces.map(p=>{
      const proj=pointRouteProjection({lat:p.lat,lng:p.lng},tripRoute.coords);
      const part=routePartName(proj.pct);
      return Object.assign({},p,{off:proj.dist,along:proj.along,part,pct:proj.pct});
    }).filter(Boolean).filter(p=>p.off<=max);
    if(section!=="any")items=items.filter(p=>section==="start"?p.pct<.33:section==="middle"?p.pct>=.33&&p.pct<=.67:p.pct>.67);
    items.sort((a,b)=>a.along-b.along||a.off-b.off);
    items=items.slice(0,24);
    if(routePlacesLayer){map.removeLayer(routePlacesLayer);routePlacesLayer=null;}
    if(!items.length){box.innerHTML=`<div class="hint">No ${cat.label.toLowerCase()} found within ${radiusMi} miles of that route section. Try “Any section” or bump the distance to 5–10 mi.</div>`;return;}
    ROUTE_SEARCH_RESULTS={};
    items.forEach(p=>{p._rid=registerRouteSearchPlace(p,cat);});
    routePlacesLayer=L.layerGroup(items.slice(0,12).map(p=>{
      const added=tripSel.includes(p._rid);
      const marker=L.marker([p.lat,p.lng],{
        icon:L.divIcon({className:"",html:`<div class="route-place-pin">${cat.label.charAt(0)}</div>`,iconSize:[26,26],iconAnchor:[13,13]})
      }).bindTooltip(`${p.name} · ${miles(p.off)} off route`,{direction:"top",offset:[0,-10]});
      marker.bindPopup(`<div class="route-popup"><b>${esc(p.name)}</b><div class="meta">${miles(p.off)} off route · mile ${Math.round(p.along/1609.34)} · ${p.part}</div><button class="tinybtn primary" data-route-place-add="${p._rid}" ${added?"disabled":""}>${added?"Added":"Add to route"}</button></div>`);
      marker.on("popupopen",e=>{
        const b=e.popup.getElement().querySelector("[data-route-place-add]");
        if(b)b.onclick=()=>addSearchedPlaceToRoute(b.dataset.routePlaceAdd,box);
      });
      return marker;
    })).addTo(map);
    showRouteHud();
    const scroll=el("div","placescroll");
    items.forEach(p=>{
      const card=el("div","placecard");
      const phone=p.tags.phone||p.tags["contact:phone"];
      const addr=(p.tags&&p.tags.formatted)||[p.tags["addr:housenumber"],p.tags["addr:street"]].filter(Boolean).join(" ");
      const added=tripSel.includes(p._rid);
      card.innerHTML=`<div><div class="nm">${esc(p.name)}</div>
        <div class="meta"><span class="route-mile">${miles(p.off)}</span> off route · mile ${Math.round(p.along/1609.34)} · ${p.part}${addr?`<br>${esc(addr)}`:""}${phone?` · <a href="tel:${esc(phone)}">call</a>`:""}</div></div>
        <div class="place-actions"><button class="addroute" data-route-place-add="${p._rid}" ${added?"disabled":""}>${added?"Added":"Add stop"}</button><a class="go" href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank" rel="noopener">Maps</a></div>`;
      scroll.appendChild(card);
    });
    box.innerHTML=`<div class="route-search-progress">Found ${items.length} ${cat.label.toLowerCase()} option${items.length===1?"":"s"}.  Use <b>Add stop</b> to insert one into your route; it will become a numbered stop on the map.</div>`;
    box.appendChild(scroll);
    box.querySelectorAll("[data-route-place-add]").forEach(b=>b.onclick=()=>addSearchedPlaceToRoute(b.dataset.routePlaceAdd,box));
  }catch(e){box.innerHTML=`<div class="hint">Places search is unavailable right now (${navigator.onLine?e.message:"offline"}). Try again, or choose a smaller route section like Beginning or Toward end.</div>`;}
}

async function loadEmergency(ref,cat,box){
  box.innerHTML=`<div class="hint"><span class="spin"></span>Finding ${cat.label.toLowerCase()}…</div>`;
  const parts=cat.q.split(";").map(p=>`${p}(around:8000,${ref.lat},${ref.lng});`).join("");
  try{
    const d=await overpass(`[out:json][timeout:20];(${parts});out center 12;`);
    const items=(d.elements||[]).map(e=>{
      const la=e.lat||(e.center&&e.center.lat),ln=e.lon||(e.center&&e.center.lon);
      if(la==null)return null;
      return{name:(e.tags&&e.tags.name)||cat.label,lat:la,lng:ln,dist:haversine(ref,{lat:la,lng:ln}),phone:e.tags&&(e.tags.phone||e.tags["contact:phone"])};
    }).filter(Boolean).sort((a,b)=>a.dist-b.dist).slice(0,12);
    if(!items.length){box.innerHTML=`<div class="hint">None found within 8 km.</div>`;return;}
    const scroll=el("div","placescroll");
    items.forEach(p=>{
      const c=el("div","placecard");
      c.innerHTML=`<div><div class="nm">${cat.icon} ${esc(p.name)}</div><div class="meta">${miles(p.dist)} away${p.phone?`<br><a href="tel:${esc(p.phone)}">${esc(p.phone)}</a>`:""}</div></div>
        <a class="go" href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}" target="_blank" rel="noopener">Directions</a>`;
      scroll.appendChild(c);
    });
    box.innerHTML="";box.appendChild(scroll);
  }catch(e){box.innerHTML='<div class="hint">Service unavailable — call 911 directly.</div>';}
}

async function updateBanner(coord,label){
  try{
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lng}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto&forecast_days=5`;
    const r=await fetch(u);if(!r.ok)throw 0;const d=await r.json();
    const cur=d.current,w=wxText(cur.weather_code);
    $("#wxIcon").textContent=w.icon;$("#wxTemp").textContent=Math.round(cur.temperature_2m)+"\xb0";
    const days=d.daily;
    const nowTemp=Math.round(cur.temperature_2m);
    let chips=`<span class="fc-loc"><span class="dot" id="netdot"></span><span class="fc-city">${esc(label||"Forecast")}</span><span class="fc-now">${w.icon} ${nowTemp}°</span></span>`;
    for(let i=0;i<days.time.length;i++){
      const dt=new Date(days.time[i]+"T12:00");
      const lbl=i===0?"Today":dt.toLocaleDateString(undefined,{weekday:"short"});
      chips+=`<span class="fc-day"><span class="d">${lbl}</span> ${wxText(days.weather_code[i]).icon} <span class="t">${Math.round(days.temperature_2m_max[i])}\xb0/${Math.round(days.temperature_2m_min[i])}\xb0</span></span>`;
    }
    $("#fcStrip").innerHTML=chips;setNet();
  }catch(e){
    $("#wxTemp").textContent="--\xb0";
    $("#fcStrip").innerHTML=`<span class="fc-loc"><span class="dot off" id="netdot"></span> forecast unavailable</span>`;
  }
}

function cleanPlaceLabel(name){
  return String(name||"").replace(/^Township of\s+/i,"").replace(/^City of\s+/i,"").replace(/,?\s*United States$/i,"").trim();
}
async function currentCityLabel(coord){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${coord.lat}&longitude=${coord.lng}&localityLanguage=en`,{cache:"force-cache"});
    const d=await r.json();
    const raw=d.city||d.locality||d.localityInfo?.administrative?.find(x=>/city|town|village/i.test(x.adminLevelDescription||""))?.name||d.principalSubdivision||"Near you";
    const label=cleanPlaceLabel(raw);
    const state=(d.principalSubdivisionCode||d.principalSubdivision||"").replace(/^US-/i,"");
    return label && state && !label.includes(state) ? `${label}, ${state}` : (label||"Near you");
  }catch(e){return "Near you";}
}
async function locateMe(announce){
  if(!navigator.geolocation){toast("Location not available");return;}
  navigator.geolocation.getCurrentPosition(async p=>{
    userPos={lat:p.coords.latitude,lng:p.coords.longitude};
    setUserTruckMarker(userPos);
    if(announce){map.setView([userPos.lat,userPos.lng],10);toast("Centered on your location");}
    const city=await currentCityLabel(userPos);
    updateBanner(userPos,city);
    renderMarkers();renderFilters();
    if(selectedId)openLocation(selectedId);
  },()=>toast("Couldn't get location — check permissions"),{enableHighAccuracy:true,timeout:8000,maximumAge:60000});
}
async function updateBanner(coord,label){
  try{
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lng}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto&forecast_days=5`;
    const r=await fetch(u);if(!r.ok)throw 0;const d=await r.json();
    const cur=d.current,w=wxText(cur.weather_code), temp=Math.round(cur.temperature_2m);
    const wxIcon=$("#wxIcon"), wxTemp=$("#wxTemp");
    if(wxIcon)wxIcon.textContent=w.icon;
    if(wxTemp)wxTemp.textContent=temp+"°";
    const days=d.daily;
    let chips=`<span class="fc-loc"><span class="dot" id="netdot"></span><span class="fc-city">${esc(label||"Forecast")}</span></span>`;
    for(let i=0;i<Math.min(5,days.time.length);i++){
      const dt=new Date(days.time[i]+"T12:00");
      const lbl=i===0?"Today":dt.toLocaleDateString(undefined,{weekday:"short"});
      chips+=`<span class="fc-day"><span class="d">${lbl}</span> ${wxText(days.weather_code[i]).icon} <span class="t">${Math.round(days.temperature_2m_max[i])}°/${Math.round(days.temperature_2m_min[i])}°</span></span>`;
    }
    const fc=$("#fcStrip"); if(fc)fc.innerHTML=chips; setNet();
  }catch(e){
    const wxTemp=$("#wxTemp"); if(wxTemp)wxTemp.textContent="--°";
    const fc=$("#fcStrip"); if(fc)fc.innerHTML=`<span class="fc-loc"><span class="dot off" id="netdot"></span> forecast unavailable</span>`;
  }
}
async function routeForPoints(pts){

    singleRouteLayer=L.geoJSON(rt.geometry,{style:{color:"#0E6F46",weight:5,opacity:.68,dashArray:"8 8",lineCap:"round",lineJoin:"round"}}).addTo(map);

function googleRouteUrlForPoints(pts){
  const good=(pts||[]).filter(p=>p&&Number.isFinite(+p.lat)&&Number.isFinite(+p.lng));
  if(!good.length)return 'https://www.google.com/maps';
  if(good.length===1)return `https://www.google.com/maps/dir/?api=1&destination=${good[0].lat},${good[0].lng}`;
  return 'https://www.google.com/maps/dir/'+good.map(p=>`${p.lat},${p.lng}`).join('/');
}
function activeNavigatePoints(l){
  if(tripRoute&&tripRoute.pts&&tripRoute.pts.length>=2)return tripRoute.pts;
  let pts=tripSel.map(loc).filter(Boolean);
  if(l && !pts.find(p=>p.id===l.id)) pts=pts.concat([l]);
  if(pts.length>=2)return pts;
  if(l){
    if(userPos)return [{lat:userPos.lat,lng:userPos.lng,name:'Your location'},l];
    return [l];
  }
  return pts;
}

function routeWeatherPoints(){
  if(!tripRoute||!tripRoute.pts||!tripRoute.pts.length)return [];
  const pts=tripRoute.pts;
  let picks=pts;
  if(pts.length>5){picks=pts.slice(0,4).concat([pts[pts.length-1]]);}
  return picks.map(p=>{
    const idx=pts.indexOf(p);
    const pct=pts.length>1?idx/(pts.length-1):0;
    return {label:`${idx+1}. ${p.name}`,pct,point:{lat:p.lat,lng:p.lng},etaSec:(tripRoute.duration||0)*pct,stop:p};
  }).filter(x=>x.point);
}
function routeWeatherSummaryText(items){
  if(!items||!items.length)return 'Trip forecast unavailable.';
  const bad=items.find(i=>i.risk.level==='bad');
  const warn=items.find(i=>i.risk.level==='warn');
  if(bad)return `Watch ${bad.risk.label} near ${bad.label.replace(/^\d+\.\s*/,'')} (${bad.etaLabel}).`;
  if(warn)return `Heads up: ${warn.risk.label} near ${warn.label.replace(/^\d+\.\s*/,'')} (${warn.etaLabel}).`;
  return 'No major weather issues flagged for the selected stops.';
}
function routeWeatherHTML(cache){

  const cards=items.map(i=>{

    const pop=Number.isFinite(Number(i.sample.pop))?`${Math.round(Number(i.sample.pop))}% rain`:'rain n/a';
    const wind=Number.isFinite(Number(i.sample.wind))?`${Math.round(Number(i.sample.wind))} mph wind`:'wind n/a';
    return `<div class="route-weather-card ${i.risk.level==='bad'?'bad':i.risk.level==='warn'?'warn':''}"><div class="where">${esc(i.label)} · ${esc(i.etaLabel)}</div><div class="temp">${i.wx.icon} ${temp}</div><div class="meta">${esc(i.wx.short)} · ${pop}<br>${wind}${Number.isFinite(Number(i.sample.gust))?` · gust ${Math.round(Number(i.sample.gust))}`:''}</div></div>`;
  }).join('');

function alertSeverityRank(sev){return {Extreme:4,Severe:3,Moderate:2,Minor:1,Unknown:0}[sev]||0;}
function isSevereWxAlert(p){
  const event=String(p.event||'');
  const sev=String(p.severity||'');
  return alertSeverityRank(sev)>=3 || /(Tornado|Severe Thunderstorm|Flash Flood|Extreme Wind|High Wind|Winter Storm|Blizzard|Ice Storm|Excessive Heat|Red Flag|Fire Weather|Flood Warning)/i.test(event);
}
function alertCacheKey(){return 'f54_wx_alerts_cache_v2';}
async function fetchAlertsForPoint(pt){
  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),6500);
  try{
    const r=await fetch(`https://api.weather.gov/alerts/active?point=${pt.lat},${pt.lng}`,{signal:ctrl.signal,headers:{'Accept':'application/geo+json'}});
    clearTimeout(to);
    if(!r.ok)return [];
    const d=await r.json();
    return (d.features||[]).map(f=>({id:f.id||f.properties?.id||'',props:f.properties||{},point:pt})).filter(a=>isSevereWxAlert(a.props));
  }catch(e){clearTimeout(to);return [];}
}
function renderWeatherAlerts(alerts){
  const ticker=$('#ticker'); if(!ticker)return;
  if(!ticker.querySelector('.ticker-text')){const s=document.createElement('span');s.className='ticker-text';ticker.appendChild(s);}
  if(!alerts||!alerts.length){ticker.classList.remove('wx-alert','wx-watch');ticker.hidden=true;return;}
  const anyWarning=alerts.some(a=>/Warning|Emergency/i.test(a.event||''));
  ticker.classList.add('wx-alert');ticker.classList.toggle('wx-watch',!anyWarning);ticker.hidden=false;
  ticker.querySelector('.ticker-text').innerHTML=alerts.slice(0,8).map(a=>`${alertSafeText(a.event)} — ${alertSafeText(a.impacts.slice(0,3).join(', '))}${a.more?` +${a.more}`:''}`).join(' &nbsp;&nbsp; ◆ &nbsp;&nbsp; ');
  ticker.onclick=()=>openGen('Severe weather alerts',inner=>{
    inner.innerHTML=`<div class="hint">Active severe alerts affecting selected store areas.</div>${alerts.map(a=>`<div class="notice alert-detail"><b>${alertSafeText(a.event)}</b><br>${alertSafeText(a.headline||a.area||'Weather alert')}<br><small>${alertSafeText(a.impacts.join(', '))}${a.expires?` · until ${new Date(a.expires).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}`:''}</small></div>`).join('')}`;
  });
}
async function checkSevereWeatherAlerts(opts={}){
  const key=alertCacheKey();
  try{
    const cache=JSON.parse(localStorage.getItem(key)||'null');
    if(cache&&!opts.force&&Date.now()-cache.ts<55*1000){renderWeatherAlerts(cache.alerts||[]);return;}
  }catch(e){}
  const pts=[];
  if(userPos)pts.push({lat:userPos.lat,lng:userPos.lng,label:'Near you',user:true});
  LOCS.filter(l=>!l.upcoming).forEach(l=>pts.push({lat:l.lat,lng:l.lng,label:`${l.name} (${l.market})`,storeId:l.id,market:l.market}));
  const byId=new Map();
  for(let i=0;i<pts.length;i+=5){
    const batch=pts.slice(i,i+5);
    const res=await Promise.all(batch.map(fetchAlertsForPoint));
    res.flat().forEach(a=>{
      const p=a.props;
      const id=a.id||p.id||`${p.event}|${p.headline}|${p.areaDesc}`;

      const row=byId.get(id);
      const label=a.point.user?'Near you':a.point.label;
      if(!row.impacts.includes(label))row.impacts.push(label);

  }
  const alerts=[...byId.values()].sort((a,b)=>alertSeverityRank(b.severity)-alertSeverityRank(a.severity)||a.event.localeCompare(b.event)).map(a=>{if(a.impacts.length>3){a.more=a.impacts.length-3;}return a;});
  try{localStorage.setItem(key,JSON.stringify({ts:Date.now(),alerts}));}catch(e){}
  renderWeatherAlerts(alerts);
}

async function geoapifyRoute(pts){
  const key=geoapifyKey();
  if(!key)throw new Error('missing Geoapify key');
  const waypoints=pts.map(p=>`${p.lat},${p.lng}`).join('|');
  const url=`https://api.geoapify.com/v1/routing?waypoints=${encodeURIComponent(waypoints)}&mode=drive&format=geojson&apiKey=${encodeURIComponent(key)}`;
  const r=await fetch(url);
  const d=await r.json();
  if(!r.ok||d.error)throw new Error((d&&d.message)||`Geoapify routing HTTP ${r.status}`);
  const f=d.features&&d.features[0];
  if(!f||!f.geometry)throw new Error('No Geoapify route returned');
  let raw=[];
  if(f.geometry.type==='LineString')raw=f.geometry.coordinates;
  else if(f.geometry.type==='MultiLineString')raw=f.geometry.coordinates.flat();
  if(!raw.length)throw new Error('Geoapify route has no geometry');
  const coords=raw.map(c=>({lng:c[0],lat:c[1]}));
  const props=f.properties||{};
  const legsRaw=Array.isArray(props.legs)?props.legs:[];
  const legs=legsRaw.map(l=>({distance:Number(l.distance)||0,duration:Number(l.time)||Number(l.duration)||0}));
  const distance=Number(props.distance)||Number(props.summary&&props.summary.distance)||legs.reduce((s,l)=>s+l.distance,0)||0;
  const duration=Number(props.time)||Number(props.duration)||Number(props.summary&&props.summary.duration)||legs.reduce((s,l)=>s+l.duration,0)||0;
  return {coords,distance,duration,legs,geometry:{type:'LineString',coordinates:coords.map(c=>[c.lng,c.lat])},source:'Route'};
}
async function osrmRoute(pts){
  const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${pts.map(p=>`${p.lng},${p.lat}`).join(';')}?overview=full&geometries=geojson`);
  const d=await r.json();const rt=d.routes&&d.routes[0];
  if(!rt||!rt.geometry)throw new Error('Route unavailable');
  const coords=rt.geometry.coordinates.map(c=>({lng:c[0],lat:c[1]}));
  const legs=(rt.legs||[]).map(l=>({distance:Number(l.distance)||0,duration:Number(l.duration)||0}));
  return {coords,distance:rt.distance,duration:rt.duration,legs,geometry:rt.geometry,source:'Route'};
}

}

async function addStoreToTrip(id,mode){
  const l=loc(id);if(!l)return;
  clearSingleRoutePreview();
  if(mode==='start'||!tripSel.length){
    tripSel=[id];tripRoute=null;clearTripRouteMap(false);renderMarkers();toast(`Started route at ${l.name}`);
    showRouteHud();
  }else if(!tripSel.includes(id)){
    tripSel.push(id);tripRoute=null;clearTripRouteMap(false);renderMarkers();toast(`Added ${l.name} to route`);
  }else{toast(`${l.name} is already in the route`);}
  refreshSelectedStoreRouteUI();
  if(tripSel.length>=2){
    try{await buildTrip(null,{fit:false});}catch(e){showRouteHud();}

  }else showRouteHud();

async function removeTripStopAt(index){
  index=Number(index);if(!Number.isInteger(index)||index<0||index>=tripSel.length)return;
  const removed=loc(tripSel[index]);
  tripSel.splice(index,1);tripRoute=null;clearTripRouteMap(tripSel.length<2);renderMarkers();
  if(tripSel.length>=2){try{await buildTrip(null,{fit:false});}catch(e){showRouteHud();}}
  else showRouteHud();

async function buildTrip(out,opts={}){
  const hasOut=!!out;
  if(tripSel.length<2){if(hasOut)out.innerHTML='<div class="hint">Add at least two stops.</div>';else toast('Add at least two stops.');return;}
  if(hasOut)out.innerHTML=`<div class="hint"><span class="spin"></span>Calculating route…</div>`;else toast('Calculating route…');
  const pts=tripSel.map(loc).filter(Boolean);
  if(pts.length<2){if(hasOut)out.innerHTML='<div class="hint">Add at least two valid stops.</div>';else toast('Add at least two valid stops.');return;}
  try{
    let rt;
    try{rt=hasGeoapify()?await geoapifyRoute(pts):await osrmRoute(pts);}catch(primaryErr){if(hasGeoapify()){console.warn('Geoapify routing failed; falling back to OSRM',primaryErr);rt=await osrmRoute(pts);rt.source='Route';}else throw primaryErr;}
    tripRoute={pts,coords:rt.coords,distance:rt.distance,duration:rt.duration,legs:rt.legs||[],geometry:rt.geometry,source:rt.source};
    ROUTE_WEATHER_CACHE=null;ROUTE_WEATHER_ERROR='';
    drawTripRouteMap(opts.fit===true);
    if(hasOut){renderTripTools(out,false);closeGen();}
    showRouteHud();loadRouteWeather(false).then(()=>showRouteHud()).catch(()=>showRouteHud());
    toast('Route updated');
  }catch(e){if(hasOut)out.innerHTML=`<div class="hint">Routing unavailable right now. ${esc(e.message||'')}</div>`;else toast('Routing unavailable right now');}
}
function drawTripRouteMap(fit){
  if(!tripRoute)return;
  clearSingleRoutePreview();
  if(routeLayer)map.removeLayer(routeLayer);
  if(tripStopLayer)map.removeLayer(tripStopLayer);
  routeLayer=L.geoJSON(tripRoute.geometry,{style:{color:'#B5121B',weight:6,opacity:.84,lineCap:'round',lineJoin:'round'}}).addTo(map);
  const badges=tripRoute.pts.map((p,i)=>L.marker([p.lat,p.lng],{
    icon:L.divIcon({className:'',html:`<div class="route-stop-badge${p.kind==='place'?' via':''}">${i+1}</div>`,iconSize:[16,16],iconAnchor:[-8,20]})
  }).bindTooltip(`${i+1}. ${p.name}${p.kind==='place'?' · selected place':''}`,{direction:'top',offset:[8,-22]}));
  tripStopLayer=L.layerGroup(badges).addTo(map);
  renderMarkers();
  try{routeLayer.bringToFront();tripStopLayer.eachLayer(m=>m.setZIndexOffset(850));}catch(e){}
  if(fit){try{map.fitBounds(routeLayer.getBounds().pad(.18));}catch(e){}}
}

function legMilesText(i,pts){
  if(i<=0)return '';
  const leg=(tripRoute&&tripRoute.legs&&tripRoute.legs[i-1])?tripRoute.legs[i-1]:null;
  if(leg&&Number.isFinite(Number(leg.distance)))return miles(leg.distance);
  const a=pts&&pts[i-1], b=pts&&pts[i];
  if(a&&b&&Number.isFinite(a.lat)&&Number.isFinite(b.lat)){
    return `${Math.round(haversine(a,b))} mi`;
  }
  return '';
}

    return `${leg}${routeStopChip(p,i,removable)}`;
  }).join('');

/* ---------- Forecast consistency override ----------
   Uses hourly Open-Meteo precipitation probability + weather code for the header,
   store forecast, and route/store travel panels so the daily labels match everywhere. */
function wxSeverity(code){
  code=Number(code);
  if(code>=95)return 6;                    // thunderstorm
  if((code>=71&&code<=77)||(code>=85&&code<=86))return 5; // snow
  if((code>=61&&code<=67)||(code>=80&&code<=82)||(code>=51&&code<=57))return 4; // rain/showers/drizzle
  if(code>=45&&code<=48)return 2;           // fog
  if(code>=1&&code<=3)return 1;             // clouds
  return 0;                                 // clear/unknown
}
function isWetCode(code){return wxSeverity(code)>=4;}
function dailySummaryFromHourly(day, hourly, dailyCode){
  const times=(hourly&&hourly.time)||[];
  let maxPop=0, wetCode=null, skyCode=null, bestWet=-1, bestSky=-1;
  for(let i=0;i<times.length;i++){
    if(String(times[i]).slice(0,10)!==day)continue;
    const code=Number(hourly.weather_code&&hourly.weather_code[i]);
    const pop=Number(hourly.precipitation_probability&&hourly.precipitation_probability[i])||0;
    maxPop=Math.max(maxPop,pop);
    const sev=wxSeverity(code);
    if(isWetCode(code) && (pop>=25 || sev>=5) && sev>bestWet){wetCode=code;bestWet=sev;}
    if(!isWetCode(code) && sev>=bestSky){skyCode=code;bestSky=sev;}
  }
  let code=Number.isFinite(Number(dailyCode))?Number(dailyCode):0;
  let cls="clearish";
  if(wetCode!==null && maxPop>=50){
    code=wetCode; cls="wet";
  }else if(wetCode!==null && maxPop>=25){
    code=80; cls="chance";
  }else if(skyCode!==null){
    code=skyCode; cls="clearish";
  }
  const wx=wxText(code);
  return {code, wx, pop:Math.round(maxPop), cls};
}
function forecastUrl(lat,lng,days=5){
  return `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,wind_speed_10m&hourly=weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=${days}`;
}
function forecastChips(d,limit=5,header=false){
  const days=d&&d.daily;
  if(!days||!days.time)return "";
  let out="";
  for(let i=0;i<Math.min(limit,days.time.length);i++){
    const day=days.time[i];
    const dt=new Date(day+"T12:00");
    const lbl=header?(i===0?"Today":dt.toLocaleDateString(undefined,{weekday:"short"})):dt.toLocaleDateString(undefined,{weekday:"short"});
    const s=dailySummaryFromHourly(day,d.hourly,days.weather_code&&days.weather_code[i]);
    const hi=Math.round(days.temperature_2m_max[i]);
    const lo=Math.round(days.temperature_2m_min[i]);
    const popTxt=s.pop>=20?`<span class="pop">${s.pop}%</span>`:"";
    out+=header
      ? `<span class="fc-day ${s.cls}"><span class="d">${lbl}</span> ${s.wx.icon} <span class="t">${hi}°/${lo}°</span>${popTxt}</span>`
      : `<span class="chip ${s.cls}">${lbl} ${s.wx.icon} <b>${hi}°/${lo}°</b>${popTxt}</span>`;
  }
  return out;
}

const SEVERE_WX_REFRESH_MS = 60 * 1000;
let SEVERE_WX_TIMER = null;

async function severeWeatherTick(force=true){

  try{
    await checkSevereWeatherAlerts({force});
  }catch(e){

function uid(prefix="id"){return prefix+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8);}

function resizeImageDataUrl(file,maxSide=1100,quality=.74){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("Could not read image"));
    reader.onload=()=>{
      img.onerror=()=>reject(new Error("Could not load image"));
      img.onload=()=>{
        const scale=Math.min(1,maxSide/Math.max(img.width,img.height));
        const w=Math.max(1,Math.round(img.width*scale));
        const h=Math.max(1,Math.round(img.height*scale));
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function makeThumbFromDataUrl(dataUrl,w=180,h=140,quality=.72){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onerror=()=>reject(new Error("Could not load thumbnail"));
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext("2d");
      ctx.fillStyle="#FFF9EC";ctx.fillRect(0,0,w,h);
      const scale=Math.max(w/img.width,h/img.height);
      const sw=img.width*scale, sh=img.height*scale;
      ctx.drawImage(img,(w-sw)/2,(h-sh)/2,sw,sh);
      resolve(canvas.toDataURL("image/jpeg",quality));
    };
    img.src=dataUrl;
  });
}

function makeVerticalDragScroll(scroller){
  if(!scroller)return;
  let down=false,startY=0,startTop=0,moved=false;
  const interactive='button,input,select,textarea,a,label,img,[data-photo-open]';
  scroller.addEventListener("pointerdown",e=>{
    if(e.pointerType==="touch")return;
    if(e.target.closest(interactive))return;
    down=true;moved=false;startY=e.clientY;startTop=scroller.scrollTop;
    scroller.classList.add("dragging");
    try{scroller.setPointerCapture(e.pointerId);}catch(_){}
  });
  scroller.addEventListener("pointermove",e=>{
    if(!down)return;
    const dy=e.clientY-startY;
    if(Math.abs(dy)>3)moved=true;
    scroller.scrollTop=startTop-dy;
    if(moved)e.preventDefault();
  });
  const up=e=>{
    if(!down)return;
    down=false;
    scroller.classList.remove("dragging");
    try{scroller.releasePointerCapture(e.pointerId);}catch(_){}
  };
  scroller.addEventListener("pointerup",up);
  scroller.addEventListener("pointercancel",up);
  scroller.addEventListener("mouseleave",up);
}

/* ---------- PWA install support ---------- */
let deferredInstallPrompt = null;

function isStandalonePwa(){
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

function setupPwaInstall(){
  /* Plain embedded HTML: service worker disabled because this is a single-file build. */

  const promptBox = document.getElementById("installPrompt");
  const installBtn = document.getElementById("installAppBtn");
  const closeBtn = document.getElementById("installCloseBtn");

  window.addEventListener("beforeinstallprompt", event => {
    event.preventDefault();
    deferredInstallPrompt = event;
    if (promptBox && !isStandalonePwa() && localStorage.getItem("f54_install_dismissed") !== "1") {
      promptBox.classList.add("show");
    }
  });

  if (installBtn) {
    installBtn.addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      try { await deferredInstallPrompt.userChoice; } catch (_) {}
      deferredInstallPrompt = null;
      if (promptBox) promptBox.classList.remove("show");
    });
  }

  if (closeBtn) {
    closeBtn.addEventListener("click", () => {
      localStorage.setItem("f54_install_dismissed", "1");
      if (promptBox) promptBox.classList.remove("show");
    });
  }

  window.addEventListener("appinstalled", () => {
    deferredInstallPrompt = null;
    localStorage.setItem("f54_install_dismissed", "1");
    if (promptBox) promptBox.classList.remove("show");
  });
}

<script>
/* ---------- Marker label + garage drag/apply fixes ---------- */
(function(){
  function unslantMarkerText(){
    document.querySelectorAll('.leaflet-marker-icon .pin-label,.leaflet-marker-icon .marker-label,.leaflet-marker-icon .store-label,.leaflet-marker-icon .loc-label,.leaflet-marker-icon .num,.leaflet-marker-icon .label,.leaflet-marker-icon [class*="label"],.leaflet-marker-icon [class*="num"]').forEach(el=>{
      el.style.transform='none';
      el.style.rotate='0deg';
      el.style.writingMode='horizontal-tb';
      el.style.fontStyle='normal';
    });
  }

  function selectedVehicleFinal(){
    const saved = localStorage.getItem('f54_vehicle_choice_v4') || localStorage.getItem('f54_vehicle_choice_v3') || localStorage.getItem('f54_vehicle_choice_v2') || localStorage.getItem('f54_vehicle_choice') || 'f150';
    return ['f150','ram','lightning','dot'].includes(saved) ? saved : 'f150';
  }

  function saveVehicleFinal(v){
    if(!['f150','ram','lightning','dot'].includes(v)) v='f150';
    localStorage.setItem('f54_vehicle_choice_v4',v);
    localStorage.setItem('f54_vehicle_choice_v3',v);
    localStorage.setItem('f54_vehicle_choice_v2',v);
    localStorage.setItem('f54_vehicle_choice',v);
  }

  function syncGarageFinal(){
    const active=selectedVehicleFinal();
    document.querySelectorAll('.garage-opt').forEach(btn=>{
      btn.classList.toggle('on', btn.dataset.vehicle===active);
      btn.setAttribute('aria-selected', btn.dataset.vehicle===active ? 'true':'false');
    });
  }

  function patchGarageDrag(){
    const panel=document.getElementById('garagePanel');
    const grid=panel && panel.querySelector('.garage-grid');
    if(!grid || grid._dragPatchReady)return;
    grid._dragPatchReady=true;

    grid.querySelectorAll('img').forEach(img=>{
      img.draggable=false;
      img.addEventListener('dragstart',e=>e.preventDefault());
    });

    let down=false,startX=0,startLeft=0,moved=false,lastDownTarget=null;

    grid.addEventListener('pointerdown',e=>{
      if(e.pointerType==='touch')return;
      down=true;
      moved=false;
      lastDownTarget=e.target;
      startX=e.clientX;
      startLeft=grid.scrollLeft;
      grid.classList.add('dragging');
      try{grid.setPointerCapture(e.pointerId);}catch(_){}
      e.preventDefault();
    }, true);

    grid.addEventListener('pointermove',e=>{
      if(!down)return;
      const dx=e.clientX-startX;
      if(Math.abs(dx)>4)moved=true;
      grid.scrollLeft=startLeft-dx;
      if(moved)e.preventDefault();
    }, true);

    const endDrag=e=>{
      if(!down)return;
      down=false;
      grid.classList.remove('dragging');
      try{grid.releasePointerCapture(e.pointerId);}catch(_){}
      if(moved){
        const blocker=ev=>{
          ev.preventDefault();
          ev.stopPropagation();
          document.removeEventListener('click',blocker,true);
        };
        document.addEventListener('click',blocker,true);
      }
    };

    grid.addEventListener('pointerup',endDrag,true);
    grid.addEventListener('pointercancel',endDrag,true);
    grid.addEventListener('mouseleave',endDrag,true);
  }

  function patchGarageApply(){
    const panel=document.getElementById('garagePanel');
    const btn=document.getElementById('garageBtn');
    const close=document.getElementById('garageClose');
    if(!panel || panel._applyPatchReady)return;
    panel._applyPatchReady=true;

    // Keep panel open until X or garage button.
    panel.querySelectorAll('.garage-opt').forEach(opt=>{
      opt.addEventListener('click',e=>{
        e.preventDefault();
        e.stopPropagation();
        saveVehicleFinal(opt.dataset.vehicle);
        syncGarageFinal();

        // If we already have a user position, apply immediately.
        try{
          if(typeof userPos !== 'undefined' && userPos && typeof setUserTruckMarker === 'function'){
            setUserTruckMarker(userPos);
          }else if(typeof locateMe === 'function'){
            locateMe(false);
          }
        }catch(err){
          console.warn('Vehicle marker apply failed',err);
        }

        if(typeof toast === 'function'){
          const label=opt.dataset.vehicle==='f150'?'F-150':opt.dataset.vehicle==='ram'?'Ram':opt.dataset.vehicle==='lightning'?'Lightning':'Dot';
          toast(label+' selected');
        }
      }, true);
    });

    if(close && !close._closePatchReady){
      close._closePatchReady=true;
      close.addEventListener('click',e=>{
        e.preventDefault();
        e.stopPropagation();
        panel.setAttribute('hidden','hidden');
        if(btn)btn.classList.remove('active');
      }, true);
    }

    syncGarageFinal();
  }

  function runPatches(){
    unslantMarkerText();
    patchGarageDrag();
    patchGarageApply();
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',runPatches);
  else runPatches();

  setInterval(unslantMarkerText,1200);
  setTimeout(runPatches,300);
  setTimeout(runPatches,900);

  // Patch marker render/update paths without changing behavior.
  ['renderMarkers','openLocation','drawTripRouteMap'].forEach(name=>{
    try{
      if(typeof window[name]==='function' && !window[name]._unslantWrapped){
        const old=window[name];
        const wrapped=function(){
          const out=old.apply(this,arguments);
          setTimeout(unslantMarkerText,40);
          return out;
        };
        wrapped._unslantWrapped=true;
        window[name]=wrapped;
      }
    }catch(_){}
  });
})();
</script>

<script id="garageVehicleFinalScript">
(function(){
  const VEHICLE_KEY = 'f54_vehicle_choice_final';
  const VEHICLES = [
    {id:'f150', label:'F-150', src:'assets/asset-006.webp'},
    {id:'ram', label:'Ram', src:'assets/asset-007.webp'},
    {id:'lightning', label:'Lightning', src:'assets/asset-008.webp'},
    {id:'corvette', label:'Corvette', src:'assets/asset-016.webp'},
    {id:'delorean', label:'DeLorean', src:'assets/asset-017.webp'},
    {id:'dot', label:'Dot', src:''}
  ];
  const vehicleMap = Object.fromEntries(VEHICLES.map(v=>[v.id,v]));

  function currentVehicle(){
    const raw = localStorage.getItem(VEHICLE_KEY) || localStorage.getItem('f54_vehicle_choice_v4') || localStorage.getItem('f54_vehicle_choice_v3') || localStorage.getItem('f54_vehicle_choice_v2') || localStorage.getItem('f54_vehicle_choice') || 'f150';
    return vehicleMap[raw] ? raw : 'f150';
  }
  function saveVehicle(id){
    const v = vehicleMap[id] ? id : 'f150';
    [VEHICLE_KEY,'f54_vehicle_choice_v4','f54_vehicle_choice_v3','f54_vehicle_choice_v2','f54_vehicle_choice'].forEach(k=>localStorage.setItem(k,v));
    return v;
  }
  function sizeFor(kind){
    const z = (typeof map !== 'undefined' && map && map.getZoom) ? map.getZoom() : 10;
    if(kind === 'dot') return [26,26];
    const h = Math.max(74, Math.min(130, Math.round(74 + (z - 7) * 7)));
    const w = Math.round(h * 0.58);
    return [w,h];
  }
  function iconFor(kind){
    if(kind === 'dot'){
      return L.divIcon({ className:'user-dot-marker', html:'<span class="udot"></span>', iconSize:[26,26], iconAnchor:[13,13] });
    }
    const item = vehicleMap[kind] || vehicleMap.f150;
    const dims = sizeFor(kind), w=dims[0], h=dims[1];
    return L.divIcon({
      className:'user-vehicle-marker',
      html:'<img src="'+item.src+'" alt="'+item.label+'">',
      iconSize:[w,h],
      iconAnchor:[Math.round(w/2), Math.round(h/2)]
    });
  }
  window.setUserTruckMarker = function(latlng){
    if(typeof map === 'undefined' || !map || !latlng) return;
    const icon = iconFor(currentVehicle());
    const ll = Array.isArray(latlng) ? latlng : [latlng.lat, latlng.lng];
    if(!userMarker){
      userMarker = L.marker(ll, {icon, interactive:false, keyboard:false, zIndexOffset:1200}).addTo(map);
    } else {
      userMarker.setLatLng(ll);
      userMarker.setIcon(icon);
    }
  };
  window.refreshUserTruckMarkerSize = function(){
    if(typeof userPos !== 'undefined' && userPos) setUserTruckMarker(userPos);
  };

  function buildPanel(){
    const panel = document.getElementById('garagePanel');
    if(!panel) return null;
    panel.innerHTML = `
      <button class="garage-close" id="garageClose" type="button" aria-label="Close vehicle garage">×</button>
      <div class="garage-title">Vehicle garage</div>
      <div class="garage-sub">Select how your live position appears on the map.</div>
      <div class="garage-strip" id="garageStrip" role="listbox" aria-label="Vehicle icon choices">
        ${VEHICLES.map(v => `
          <button class="garage-opt" data-vehicle="${v.id}" type="button" aria-label="${v.label} marker">
            <div class="veh-box">${v.id === 'dot' ? '<span class="garage-dot-preview"></span>' : '<img src="'+v.src+'" alt="'+v.label+'" draggable="false">'}</div>
            <div class="veh-label">${v.label}</div>
          </button>
        `).join('')}
      </div>`;
    return panel;
  }

  function syncPanel(){
    const current = currentVehicle();
    document.querySelectorAll('#garagePanel .garage-opt').forEach(btn=>{
      const on = btn.dataset.vehicle === current;
      btn.classList.toggle('on', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });
  }

  function addDragScroll(strip){
    if(!strip) return;
    let active=false, startX=0, startLeft=0, moved=false;
    strip.addEventListener('mousedown', e=>{
      if(e.target.closest('.garage-opt')) return; // allow click to select
      active=true; moved=false; startX=e.pageX; startLeft=strip.scrollLeft; strip.classList.add('grabbing'); e.preventDefault();
    });
    window.addEventListener('mousemove', e=>{
      if(!active) return; const dx=e.pageX-startX; if(Math.abs(dx)>4) moved=true; strip.scrollLeft=startLeft-dx;
    });
    window.addEventListener('mouseup', ()=>{ active=false; strip.classList.remove('grabbing'); });
    strip.addEventListener('touchstart', e=>{ e.stopPropagation(); }, {passive:true});
    strip.addEventListener('wheel', e=>{ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ strip.scrollLeft += e.deltaY; e.preventDefault(); } }, {passive:false});
  }

  function wireGarage(){
    const oldBtn = document.getElementById('garageBtn');
    const panel = buildPanel();
    if(!oldBtn || !panel) return;
    const btn = oldBtn.cloneNode(true);
    oldBtn.parentNode.replaceChild(btn, oldBtn);
    syncPanel();
    const strip = document.getElementById('garageStrip');
    addDragScroll(strip);

    btn.addEventListener('click', e=>{
      e.preventDefault(); e.stopPropagation();
      const show = panel.hasAttribute('hidden');
      if(show) panel.removeAttribute('hidden'); else panel.setAttribute('hidden','hidden');
      btn.classList.toggle('active', show);
      syncPanel();
    });
    panel.addEventListener('click', e=>{
      const opt = e.target.closest('.garage-opt');
      if(opt){
        e.preventDefault(); e.stopPropagation();
        const v = saveVehicle(opt.dataset.vehicle);
        syncPanel();
        if(typeof userPos !== 'undefined' && userPos) setUserTruckMarker(userPos);
        if(typeof toast === 'function') toast((vehicleMap[v]?.label || 'Vehicle') + ' selected');
        return;
      }
      if(e.target.id === 'garageClose'){
        panel.setAttribute('hidden','hidden');
        btn.classList.remove('active');
      }
    });

    // don't auto-close on outside click; user requested stay open until closed
    if(typeof map !== 'undefined' && map){
      map.off && map.off('zoomend', refreshUserTruckMarkerSize);
      map.on && map.on('zoomend', refreshUserTruckMarkerSize);
    }
    if(typeof userPos !== 'undefined' && userPos) setUserTruckMarker(userPos);
  }

  function largerStoreMarkers(){
    if(document.getElementById('storeMarkerScalePatch')) return;
    const s=document.createElement('style');
    s.id='storeMarkerScalePatch';
    s.textContent='.leaflet-marker-icon:not(.user-vehicle-marker):not(.user-dot-marker):not(.leaflet-div-icon){transform:scale(1.18);transform-origin:center bottom;}';
    document.head.appendChild(s);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', ()=>{ wireGarage(); largerStoreMarkers(); });
  } else {
    wireGarage(); largerStoreMarkers();
  }
})();
</script>

<script id="garageFinalSelectScript">
(function(){

  const VEHICLES=[

    {id:'ram',label:'Ram',src:'assets/asset-007.webp'},

    {id:'default',label:'Default',src:''}
  ];
  const vehicleMap=Object.fromEntries(VEHICLES.map(v=>[v.id,v]));

  function normalizeVehicle(id){
    if(id==='dot')return 'default';
    return vehicleMap[id]?id:'f150';
  }

  function currentVehicle(){
    const raw=localStorage.getItem(VEHICLE_KEY)||
      localStorage.getItem('f54_vehicle_choice_final')||
      localStorage.getItem('f54_vehicle_choice_v4')||
      localStorage.getItem('f54_vehicle_choice_v3')||
      localStorage.getItem('f54_vehicle_choice_v2')||
      localStorage.getItem('f54_vehicle_choice')||
      'f150';
    return normalizeVehicle(raw);
  }

  function saveVehicle(id){
    const v=normalizeVehicle(id);
    [VEHICLE_KEY,'f54_vehicle_choice_final','f54_vehicle_choice_v4','f54_vehicle_choice_v3','f54_vehicle_choice_v2','f54_vehicle_choice'].forEach(k=>localStorage.setItem(k,v));
    return v;
  }

  function iconSize(kind){
    const z=(typeof map!=='undefined'&&map&&map.getZoom)?map.getZoom():10;
    if(kind==='default')return [32,32];
    const h=Math.max(86,Math.min(148,Math.round(86+(z-7)*8)));
    const w=Math.round(h*.62);
    return [w,h];
  }

  function iconFor(kind){
    if(kind==='default'){
      return L.divIcon({
        className:'user-dot-marker',
        html:'<span class="udot"></span>',
        iconSize:[32,32],
        iconAnchor:[16,16]
      });
    }
    const item=vehicleMap[kind]||vehicleMap.f150;
    const s=iconSize(kind), w=s[0], h=s[1];
    return L.divIcon({
      className:'user-vehicle-marker',
      html:'<img src="'+item.src+'" alt="'+item.label+'">',
      iconSize:[w,h],
      iconAnchor:[Math.round(w/2),Math.round(h/2)]
    });
  }

  window.setUserTruckMarker=function(latlng){
    if(typeof map==='undefined'||!map||!latlng)return;
    const ll=Array.isArray(latlng)?latlng:[latlng.lat,latlng.lng];
    const icon=iconFor(currentVehicle());

    try{
      if(typeof userMarker==='undefined'||!userMarker){
        userMarker=L.marker(ll,{icon:icon,interactive:false,keyboard:false,zIndexOffset:1400}).addTo(map);
      }else{
        if(!userMarker.setIcon){
          try{map.removeLayer(userMarker);}catch(e){}
          userMarker=L.marker(ll,{icon:icon,interactive:false,keyboard:false,zIndexOffset:1400}).addTo(map);
        }else{
          userMarker.setLatLng(ll);
          userMarker.setIcon(icon);
        }
      }
    }catch(e){
      console.warn('vehicle marker update failed',e);
    }
  };

  };

    let oldPanel=document.getElementById('garagePanel');
    if(!oldPanel)return null;

    /* Replace the panel node to remove old click handlers that blocked later vehicles. */
    const panel=oldPanel.cloneNode(false);
    panel.id='garagePanel';
    panel.className=oldPanel.className||'garage-panel';
    if(oldPanel.hasAttribute('hidden'))panel.setAttribute('hidden','hidden');
    oldPanel.parentNode.replaceChild(panel,oldPanel);

            <div class="veh-label">${v.label}</div>
          </button>
        `).join('')}
      </div>`;

    });
  }

  function wireScroll(strip){
    if(!strip)return;
    let down=false,startX=0,startLeft=0,moved=false;
    strip.addEventListener('pointerdown',e=>{
      if(e.pointerType==='touch')return;

      try{strip.setPointerCapture(e.pointerId);}catch(_e){}
    });

      if(!down)return;
      const dx=e.clientX-startX;
      if(Math.abs(dx)>4)moved=true;
      strip.scrollLeft=startLeft-dx;
      if(moved)e.preventDefault();
    });
    const up=e=>{
      if(!down)return;
      down=false;strip.classList.remove('grabbing');
      try{strip.releasePointerCapture(e.pointerId);}catch(_e){}
    };
    strip.addEventListener('pointerup',up);
    strip.addEventListener('pointercancel',up);
    strip.addEventListener('mouseleave',up);
    strip.addEventListener('wheel',e=>{
      if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){
        strip.scrollLeft+=e.deltaY;
        e.preventDefault();
      }
    },{passive:false});
  }

  function wireGarage(){
    const oldBtn=document.getElementById('garageBtn');
    const panel=buildPanel();
    if(!oldBtn||!panel)return;

    const btn=oldBtn.cloneNode(true);
    oldBtn.parentNode.replaceChild(btn,oldBtn);

    });

    if(typeof map!=='undefined'&&map){
      try{map.off('zoomend',window.refreshUserTruckMarkerSize);}catch(e){}
      map.on('zoomend',window.refreshUserTruckMarkerSize);
    }
    if(typeof userPos!=='undefined'&&userPos)window.setUserTruckMarker(userPos);

    document.addEventListener('DOMContentLoaded',()=>{wireGarage();applyMarkerScalePatch();});
  }else{
    wireGarage();applyMarkerScalePatch();
  }
})();

<script id="garageCleanSelectScript">
(function(){
  const KEY = 'f54_vehicle_choice_final_v3';
  const labels = {
    f150:'F-150',
    ram:'Ram',
    lightning:'Lightning',
    corvette:'Corvette',
    delorean:'DeLorean',
    default:'Default',
    dot:'Default'
  };

  function normalize(id){
    if(id === 'dot') return 'default';
    return labels[id] ? id : 'f150';
  }

  function current(){
    return normalize(
      localStorage.getItem(KEY) ||
      localStorage.getItem('f54_vehicle_choice_final_v2') ||
      localStorage.getItem('f54_vehicle_choice_final') ||
      localStorage.getItem('f54_vehicle_choice_v4') ||
      localStorage.getItem('f54_vehicle_choice_v3') ||
      localStorage.getItem('f54_vehicle_choice_v2') ||
      localStorage.getItem('f54_vehicle_choice') ||
      'f150'
    );
  }

  function save(id){
    const v = normalize(id);
    [KEY,'f54_vehicle_choice_final_v2','f54_vehicle_choice_final','f54_vehicle_choice_v4','f54_vehicle_choice_v3','f54_vehicle_choice_v2','f54_vehicle_choice'].forEach(k=>localStorage.setItem(k,v));
    return v;
  }

  function sync(){
    const active = current();
    document.querySelectorAll('#garagePanel .garage-opt').forEach(btn=>{
      const on = normalize(btn.dataset.vehicle) === active;
      btn.classList.toggle('on', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
      if(btn.dataset.vehicle === 'dot') btn.dataset.vehicle = 'default';
      const label = btn.querySelector('.veh-label');
      if(label && label.textContent.trim() === 'Dot') label.textContent = 'Default';
    });
  }

  function getVehicleSrc(kind){
    const img = document.querySelector('#garagePanel .garage-opt[data-vehicle="'+kind+'"] img');
    return img ? img.src : '';
  }

  function sizeFor(kind){
    const z = (typeof map !== 'undefined' && map && map.getZoom) ? map.getZoom() : 10;
    if(kind === 'default') return [34,34];
    const h = Math.max(98, Math.min(164, Math.round(98 + (z - 7) * 9)));
    const w = Math.round(h * .64);
    return [w,h];
  }

  function iconFor(kind){
    kind = normalize(kind);
    if(kind === 'default'){
      return L.divIcon({
        className:'user-dot-marker',
        html:'<span class="udot"></span>',
        iconSize:[34,34],
        iconAnchor:[17,17]
      });
    }
    const src = getVehicleSrc(kind);
    const s = sizeFor(kind), w = s[0], h = s[1];
    return L.divIcon({
      className:'user-vehicle-marker',
      html:'<img src="'+src+'" alt="'+(labels[kind] || 'Vehicle')+'">',
      iconSize:[w,h],
      iconAnchor:[Math.round(w/2),Math.round(h/2)]
    });
  }

  window.setUserTruckMarker = function(latlng){
    if(typeof map === 'undefined' || !map || !latlng) return;
    const ll = Array.isArray(latlng) ? latlng : [latlng.lat, latlng.lng];
    const icon = iconFor(current());

    try{
      if(typeof userMarker === 'undefined' || !userMarker || !userMarker.setIcon){
        if(typeof userMarker !== 'undefined' && userMarker){
          try{ map.removeLayer(userMarker); }catch(e){}
        }
        userMarker = L.marker(ll,{icon:icon,interactive:false,keyboard:false,zIndexOffset:1500}).addTo(map);
      }else{
        userMarker.setLatLng(ll);
        userMarker.setIcon(icon);
      }
    }catch(e){
      console.warn('Unable to update vehicle marker', e);
    }
  };

  window.refreshUserTruckMarkerSize = function(){
    if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
  };

  function wire(){
    const panel = document.getElementById('garagePanel');
    const btn = document.getElementById('garageBtn');
    if(!panel || !btn || panel.dataset.cleanSelectWired === '1') return;
    panel.dataset.cleanSelectWired = '1';

    const sub = panel.querySelector('.garage-sub');
    if(sub) sub.remove();

    panel.querySelectorAll('.garage-opt').forEach(opt=>{
      const img = opt.querySelector('img');
      if(img){
        img.draggable = false;
        img.addEventListener('dragstart', e=>e.preventDefault());
      }
      if(opt.dataset.vehicle === 'dot') opt.dataset.vehicle = 'default';
      const label = opt.querySelector('.veh-label');
      if(label && label.textContent.trim() === 'Dot') label.textContent = 'Default';
    });

    panel.addEventListener('pointerup', e=>{
      const opt = e.target.closest('.garage-opt');
      if(!opt) return;
      e.preventDefault();
      e.stopPropagation();

      const selected = save(opt.dataset.vehicle);
      sync();

      if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
      else if(typeof locateMe === 'function') locateMe(false);

      if(typeof toast === 'function') toast(labels[selected] + ' selected');
    }, true);

    panel.addEventListener('click', e=>{
      const close = e.target.closest('#garageClose,.garage-close');
      if(close){
        e.preventDefault();
        e.stopPropagation();
        panel.setAttribute('hidden','hidden');
        btn.classList.remove('active');
        return;
      }
      const opt = e.target.closest('.garage-opt');
      if(opt){
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);

    sync();

    if(typeof map !== 'undefined' && map){
      try{ map.off('zoomend', window.refreshUserTruckMarkerSize); }catch(e){}
      map.on('zoomend', window.refreshUserTruckMarkerSize);
    }

    if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', wire);
  else wire();
  setTimeout(wire, 500);
  setTimeout(wire, 1200);
})();
</script>

<script id="garageHardFixScript">
(function(){
  const KEY = 'f54_vehicle_choice_hardfix';

  function readVehiclesFromPanel(){
    const panel = document.getElementById('garagePanel');
    const found = new Map();
    if(panel){
      panel.querySelectorAll('.garage-opt').forEach(btn=>{
        let id = btn.dataset.vehicle || '';
        if(id === 'dot') id = 'default';
        let label = (btn.querySelector('.veh-label')?.textContent || btn.textContent || '').trim();
        if(label === 'Dot') label = 'Default';
        const img = btn.querySelector('img');
        const src = img ? img.src : '';
        if(id && !found.has(id)) found.set(id,{id,label,src});
      });
    }
    if(!found.has('default')) found.set('default',{id:'default',label:'Default',src:''});
    const order = ['f150','ram','lightning','corvette','delorean','default'];
    return order.filter(id=>found.has(id)).map(id=>found.get(id));
  }

  let VEHICLES = [];
  let vehicleMap = {};
  function refreshVehicleMap(){
    VEHICLES = readVehiclesFromPanel();
    vehicleMap = Object.fromEntries(VEHICLES.map(v=>[v.id,v]));
  }

  function normalize(id){
    if(id === 'dot') return 'default';
    return vehicleMap[id] ? id : (VEHICLES[0]?.id || 'f150');
  }

  function current(){
    refreshVehicleMap();
    return normalize(
      localStorage.getItem(KEY) ||
      localStorage.getItem('f54_vehicle_choice_final_v3') ||
      localStorage.getItem('f54_vehicle_choice_final_v2') ||
      localStorage.getItem('f54_vehicle_choice_final') ||
      localStorage.getItem('f54_vehicle_choice_v4') ||
      localStorage.getItem('f54_vehicle_choice_v3') ||
      localStorage.getItem('f54_vehicle_choice_v2') ||
      localStorage.getItem('f54_vehicle_choice') ||
      'f150'
    );
  }

  function save(id){
    refreshVehicleMap();
    const v = normalize(id);
    [KEY,'f54_vehicle_choice_final_v3','f54_vehicle_choice_final_v2','f54_vehicle_choice_final','f54_vehicle_choice_v4','f54_vehicle_choice_v3','f54_vehicle_choice_v2','f54_vehicle_choice'].forEach(k=>localStorage.setItem(k,v));
    return v;
  }

  function rebuildPanel(){
    refreshVehicleMap();
    const panel = document.getElementById('garagePanel');
    if(!panel) return null;
    const wasOpen = !panel.hasAttribute('hidden');
    const fresh = panel.cloneNode(false);
    fresh.id = 'garagePanel';
    fresh.className = panel.className || 'garage-panel';
    if(!wasOpen) fresh.setAttribute('hidden','hidden');

    fresh.innerHTML = `
      <button class="garage-close" id="garageClose" type="button" aria-label="Close vehicle garage">×</button>
      <div class="garage-title">Vehicle garage</div>
      <div class="garage-strip" id="garageStrip" role="listbox" aria-label="Vehicle choices">
        ${VEHICLES.map(v=>`
          <button class="garage-opt" data-vehicle="${v.id}" type="button" aria-label="${v.label}">
            <div class="veh-box">${v.id === 'default' ? '<span class="garage-dot-preview"></span>' : `<img src="${v.src}" alt="${v.label}" draggable="false">`}</div>
            <div class="veh-label">${v.label}</div>
          </button>
        `).join('')}
      </div>
    `;
    panel.parentNode.replaceChild(fresh,panel);
    refreshVehicleMap();
    return fresh;
  }

  function sync(panel){
    const active = current();
    (panel || document).querySelectorAll('#garagePanel .garage-opt').forEach(btn=>{
      const on = normalize(btn.dataset.vehicle) === active;
      btn.classList.toggle('on',on);
      btn.setAttribute('aria-selected',on ? 'true':'false');
    });
  }

  function markerSize(kind){
    const z = (typeof map !== 'undefined' && map && map.getZoom) ? map.getZoom() : 10;
    if(kind === 'default') return [34,34];
    const h = Math.max(104, Math.min(172, Math.round(104 + (z - 7) * 9)));
    const w = Math.round(h * .66);
    return [w,h];
  }

  function markerIcon(kind){
    refreshVehicleMap();
    kind = normalize(kind);
    if(kind === 'default'){
      return L.divIcon({className:'user-dot-marker',html:'<span class="udot"></span>',iconSize:[34,34],iconAnchor:[17,17]});
    }
    const v = vehicleMap[kind] || VEHICLES[0];
    const size = markerSize(kind);
    return L.divIcon({
      className:'user-vehicle-marker',
      html:'<img src="'+v.src+'" alt="'+v.label+'">',
      iconSize:size,
      iconAnchor:[Math.round(size[0]/2),Math.round(size[1]/2)]
    });
  }

  window.setUserTruckMarker = function(latlng){
    if(typeof map === 'undefined' || !map || !latlng) return;
    const ll = Array.isArray(latlng) ? latlng : [latlng.lat,latlng.lng];
    const icon = markerIcon(current());

    if(typeof userMarker === 'undefined' || !userMarker || !userMarker.setIcon){
      if(typeof userMarker !== 'undefined' && userMarker){
        try{ map.removeLayer(userMarker); }catch(e){}
      }
      userMarker = L.marker(ll,{icon,interactive:false,keyboard:false,zIndexOffset:1600}).addTo(map);
    }else{
      userMarker.setLatLng(ll);
      userMarker.setIcon(icon);
    }
  };

  window.refreshUserTruckMarkerSize = function(){
    if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
  };

  function wire(){
    const oldBtn = document.getElementById('garageBtn');
    if(!oldBtn) return;
    const panel = rebuildPanel();
    if(!panel) return;

    const btn = oldBtn.cloneNode(true);
    oldBtn.parentNode.replaceChild(btn,oldBtn);
    sync(panel);

    btn.addEventListener('click',e=>{
      e.preventDefault();
      e.stopPropagation();
      const show = panel.hasAttribute('hidden');
      if(show) panel.removeAttribute('hidden');
      else panel.setAttribute('hidden','hidden');
      btn.classList.toggle('active',show);
      sync(panel);
    });

    panel.addEventListener('click',e=>{
      const close = e.target.closest('#garageClose,.garage-close');
      if(close){
        e.preventDefault();
        e.stopPropagation();
        panel.setAttribute('hidden','hidden');
        btn.classList.remove('active');
        return;
      }
      const opt = e.target.closest('.garage-opt');
      if(!opt) return;
      e.preventDefault();
      e.stopPropagation();
      const selected = save(opt.dataset.vehicle);
      sync(panel);
      if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
      else if(typeof locateMe === 'function') locateMe(false);
      if(typeof toast === 'function') toast((vehicleMap[selected]?.label || 'Vehicle') + ' selected');
    }, true);

    const strip = panel.querySelector('#garageStrip');
    strip.querySelectorAll('img').forEach(img=>{
      img.draggable = false;
      img.addEventListener('dragstart',e=>e.preventDefault());
    });

    if(typeof map !== 'undefined' && map){
      try{ map.off('zoomend', window.refreshUserTruckMarkerSize); }catch(e){}
      map.on('zoomend', window.refreshUserTruckMarkerSize);
    }
    if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded',wire);
  else wire();
  setTimeout(wire,700);
  setTimeout(wire,1600);
  setTimeout(wire,2800);
})();
</script>

<script id="garageEqualVehicleSizeScript">
(function(){
  const KEY='f54_vehicle_choice_equal_size';
  const VEHICLES=[
    {id:'f150',label:'F-150',src:'assets/asset-018.webp'},
    {id:'ram',label:'Ram',src:'assets/asset-019.webp'},
    {id:'lightning',label:'Lightning',src:'assets/asset-020.webp'},
    {id:'corvette',label:'Corvette',src:'assets/asset-021.webp'},
    {id:'delorean',label:'DeLorean',src:'assets/asset-022.webp'},
    {id:'default',label:'Default',src:''}
  ];
  const vehicleMap=Object.fromEntries(VEHICLES.map(v=>[v.id,v]));

  function normalize(id){
    if(id==='dot')return 'default';
    return vehicleMap[id]?id:'f150';
  }

  function current(){
    return normalize(
      localStorage.getItem(KEY)||
      localStorage.getItem('f54_vehicle_choice_hardfix')||
      localStorage.getItem('f54_vehicle_choice_final_v3')||
      localStorage.getItem('f54_vehicle_choice_final_v2')||
      localStorage.getItem('f54_vehicle_choice_final')||
      localStorage.getItem('f54_vehicle_choice_v4')||
      localStorage.getItem('f54_vehicle_choice_v3')||
      localStorage.getItem('f54_vehicle_choice_v2')||
      localStorage.getItem('f54_vehicle_choice')||
      'f150'
    );
  }

  function save(id){
    const v=normalize(id);
    [KEY,'f54_vehicle_choice_hardfix','f54_vehicle_choice_final_v3','f54_vehicle_choice_final_v2','f54_vehicle_choice_final','f54_vehicle_choice_v4','f54_vehicle_choice_v3','f54_vehicle_choice_v2','f54_vehicle_choice'].forEach(k=>localStorage.setItem(k,v));
    return v;
  }

  function build(){
    const old=document.getElementById('garagePanel');
    if(!old)return null;
    const wasOpen=!old.hasAttribute('hidden');
    const panel=old.cloneNode(false);
    panel.id='garagePanel';
    panel.className=old.className||'garage-panel';
    if(!wasOpen)panel.setAttribute('hidden','hidden');
    panel.innerHTML=`
      <button class="garage-close" id="garageClose" type="button" aria-label="Close vehicle garage">×</button>
      <div class="garage-title">Vehicle garage</div>
      <div class="garage-strip" id="garageStrip" role="listbox" aria-label="Vehicle choices">
        ${VEHICLES.map(v=>`
          <button class="garage-opt" data-vehicle="${v.id}" type="button" aria-label="${v.label}">
            <div class="veh-box">${v.id==='default'?'<span class="garage-dot-preview"></span>':'<img src="'+v.src+'" alt="'+v.label+'" draggable="false">'}</div>
            <div class="veh-label">${v.label}</div>
          </button>
        `).join('')}
      </div>`;
    old.parentNode.replaceChild(panel,old);
    return panel;
  }

  function sync(){
    const active=current();
    document.querySelectorAll('#garagePanel .garage-opt').forEach(btn=>{
      const on=normalize(btn.dataset.vehicle)===active;
      btn.classList.toggle('on',on);
      btn.setAttribute('aria-selected',on?'true':'false');
    });
  }

  function markerIcon(kind){
    kind=normalize(kind);
    if(kind==='default'){
      return L.divIcon({className:'user-dot-marker',html:'<span class="udot"></span>',iconSize:[34,34],iconAnchor:[17,17]});
    }
    const item=vehicleMap[kind]||vehicleMap.f150;
    const z=(typeof map!=='undefined'&&map&&map.getZoom)?map.getZoom():10;
    const h=Math.max(110,Math.min(176,Math.round(110+(z-7)*9)));
    const w=h;
    return L.divIcon({
      className:'user-vehicle-marker',
      html:'<img src="'+item.src+'" alt="'+item.label+'">',
      iconSize:[w,h],
      iconAnchor:[Math.round(w/2),Math.round(h/2)]
    });
  }

  window.setUserTruckMarker=function(latlng){
    if(typeof map==='undefined'||!map||!latlng)return;
    const ll=Array.isArray(latlng)?latlng:[latlng.lat,latlng.lng];
    const icon=markerIcon(current());
    if(typeof userMarker==='undefined'||!userMarker||!userMarker.setIcon){
      if(typeof userMarker!=='undefined'&&userMarker){try{map.removeLayer(userMarker);}catch(e){}}
      userMarker=L.marker(ll,{icon,interactive:false,keyboard:false,zIndexOffset:1600}).addTo(map);
    }else{
      userMarker.setLatLng(ll);
      userMarker.setIcon(icon);
    }
  };

  window.refreshUserTruckMarkerSize=function(){
    if(typeof userPos!=='undefined'&&userPos)window.setUserTruckMarker(userPos);
  };

  function wire(){
    const oldBtn=document.getElementById('garageBtn');
    if(!oldBtn)return;
    const panel=build();
    if(!panel)return;
    const btn=oldBtn.cloneNode(true);
    oldBtn.parentNode.replaceChild(btn,oldBtn);

    sync();

    btn.addEventListener('click',e=>{
      e.preventDefault();e.stopPropagation();
      const show=panel.hasAttribute('hidden');
      if(show)panel.removeAttribute('hidden');else panel.setAttribute('hidden','hidden');
      btn.classList.toggle('active',show);
      sync();
    });

    panel.addEventListener('click',e=>{
      const close=e.target.closest('#garageClose,.garage-close');
      if(close){
        e.preventDefault();e.stopPropagation();
        panel.setAttribute('hidden','hidden');
        btn.classList.remove('active');
        return;
      }
      const opt=e.target.closest('.garage-opt');
      if(!opt)return;
      e.preventDefault();e.stopPropagation();
      const selected=save(opt.dataset.vehicle);
      sync();
      if(typeof userPos!=='undefined'&&userPos)window.setUserTruckMarker(userPos);
      else if(typeof locateMe==='function')locateMe(false);
      if(typeof toast==='function')toast((vehicleMap[selected]?.label||'Vehicle')+' selected');
    },true);

    panel.querySelectorAll('img').forEach(img=>{
      img.draggable=false;
      img.addEventListener('dragstart',ev=>ev.preventDefault());
    });

    if(typeof map!=='undefined'&&map){
      try{map.off('zoomend',window.refreshUserTruckMarkerSize);}catch(e){}
      map.on('zoomend',window.refreshUserTruckMarkerSize);
    }
    if(typeof userPos!=='undefined'&&userPos)window.setUserTruckMarker(userPos);
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wire);
  else wire();
  setTimeout(wire,800);
  setTimeout(wire,1800);
})();
</script>

<script id="garageVehicleSelectionHardOverride">
(function(){
  const ALL_KEYS = [
    'f54_vehicle_choice_fixed_html',
    'f54_vehicle_choice_equal_size',
    'f54_vehicle_choice_hardfix',
    'f54_vehicle_choice_final_v3',
    'f54_vehicle_choice_final_v2',
    'f54_vehicle_choice_final',
    'f54_vehicle_choice_v4',
    'f54_vehicle_choice_v3',
    'f54_vehicle_choice_v2',
    'f54_vehicle_choice'
  ];

  const LABELS = {
    default: 'Default',
    dot: 'Default',
    f150: 'F-150',
    ram: 'Ram',
    lightning: 'Lightning',
    corvette: 'Corvette',
    delorean: 'DeLorean'
  };

  function normalize(id){
    if(id === 'dot') return 'default';
    return LABELS[id] ? id : 'default';
  }

  function getVehicleButtons(){
    return Array.from(document.querySelectorAll('#garagePanel .garage-opt'));
  }

  function vehicleSource(id){
    id = normalize(id);
    if(id === 'default') return '';
    const opt = document.querySelector('#garagePanel .garage-opt[data-vehicle="' + id + '"]');
    const img = opt && opt.querySelector('img');
    return img ? img.src : '';
  }

  function setStoredVehicle(id){
    const v = normalize(id);
    window.__garageVehicleChoice = v;
    ALL_KEYS.forEach(k => {
      try { localStorage.setItem(k, v); } catch(e) {}
    });
    return v;
  }

  function syncGarageSelection(){
    const active = normalize(window.__garageVehicleChoice || 'default');
    getVehicleButtons().forEach(btn => {
      if(btn.dataset.vehicle === 'dot') btn.dataset.vehicle = 'default';
      const label = btn.querySelector('.veh-label');
      if(label && label.textContent.trim().toLowerCase() === 'dot') label.textContent = 'Default';

      const on = normalize(btn.dataset.vehicle) === active;
      btn.classList.toggle('on', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });

    const strip = document.querySelector('#garagePanel .garage-strip, #garagePanel #garageStrip');
    const defaultBtn = document.querySelector('#garagePanel .garage-opt[data-vehicle="default"], #garagePanel .garage-opt[data-vehicle="dot"]');
    if(strip && defaultBtn && strip.firstElementChild !== defaultBtn){
      strip.insertBefore(defaultBtn, strip.firstElementChild);
    }
  }

  function userIcon(kind){
    kind = normalize(kind);

    if(kind === 'default'){
      return L.divIcon({
        className: 'user-dot-marker',
        html: '<span class="udot"></span>',
        iconSize: [34,34],
        iconAnchor: [17,17]
      });
    }

    const src = vehicleSource(kind);
    const z = (typeof map !== 'undefined' && map && map.getZoom) ? map.getZoom() : 10;
    const size = Math.max(110, Math.min(176, Math.round(110 + (z - 7) * 9)));

    return L.divIcon({
      className: 'user-vehicle-marker',
      html: '<img src="' + src + '" alt="' + (LABELS[kind] || 'Vehicle') + '">',
      iconSize: [size, size],
      iconAnchor: [Math.round(size / 2), Math.round(size / 2)]
    });
  }

  window.setUserTruckMarker = setUserTruckMarker = function(latlng){
    if(typeof map === 'undefined' || !map || !latlng || typeof L === 'undefined') return;

    const ll = Array.isArray(latlng) ? latlng : [latlng.lat, latlng.lng];
    const icon = userIcon(window.__garageVehicleChoice || 'default');

    try{
      if(typeof userMarker === 'undefined' || !userMarker || !userMarker.setIcon){
        if(typeof userMarker !== 'undefined' && userMarker){
          try { map.removeLayer(userMarker); } catch(e) {}
        }
        userMarker = L.marker(ll, {
          icon: icon,
          interactive: false,
          keyboard: false,
          zIndexOffset: 1600
        }).addTo(map);
      } else {
        userMarker.setLatLng(ll);
        userMarker.setIcon(icon);
      }
    } catch(e) {
      console.warn('Vehicle marker update failed', e);
    }
  };

  window.refreshUserTruckMarkerSize = refreshUserTruckMarkerSize = function(){
    if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
  };

  function selectVehicle(id){
    window.__garageUserPickedVehicle = true;
    const selected = setStoredVehicle(id);
    syncGarageSelection();

    if(typeof userPos !== 'undefined' && userPos){
      window.setUserTruckMarker(userPos);
    } else if(typeof locateMe === 'function') {
      try { locateMe(false); } catch(e) {}
    }

    if(typeof toast === 'function'){
      toast((LABELS[selected] || 'Vehicle') + ' selected');
    }
  }

  function eventSelectHandler(e){
    const close = e.target.closest && e.target.closest('#garageClose,.garage-close');
    if(close) return;

    const opt = e.target.closest && e.target.closest('#garagePanel .garage-opt');
    if(!opt) return;

    e.preventDefault();
    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();

    selectVehicle(opt.dataset.vehicle);
  }

  function initGarageSelection(){
    // Fresh page load always starts as Default.
    if(!window.__garageVehicleInitDone){
      window.__garageVehicleInitDone = true;
      window.__garageUserPickedVehicle = false;
      setStoredVehicle('default');
    }

    syncGarageSelection();

    if(typeof map !== 'undefined' && map){
      try { map.off('zoomend', window.refreshUserTruckMarkerSize); } catch(e) {}
      map.on('zoomend', window.refreshUserTruckMarkerSize);
    }

    if(typeof userPos !== 'undefined' && userPos){
      window.setUserTruckMarker(userPos);
    }
  }

  // Capture phase beats older garage click handlers that were blocking changes.
  document.addEventListener('pointerup', eventSelectHandler, true);
  document.addEventListener('click', eventSelectHandler, true);

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initGarageSelection);
  } else {
    initGarageSelection();
  }

  // Older scripts rebuild/re-sync the garage after load; these re-assert the fixed state.
  [150, 600, 1200, 2500, 5200].forEach(ms => {
    setTimeout(function(){
      if(!window.__garageUserPickedVehicle && ms <= 600){
        setStoredVehicle('default');
      }
      syncGarageSelection();
      if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
    }, ms);
  });
})();
</script>
