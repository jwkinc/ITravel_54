<script id="weatherGarageFinalFixScript">
(function(){
  function closeGarage(){
    const panel = document.getElementById('garagePanel');
    const btn = document.getElementById('garageBtn');
    if(panel) panel.setAttribute('hidden','hidden');
    if(btn) btn.classList.remove('active');
  }

  function wireGarageOutsideClose(){
    if(window.__garageOutsideCloseWired) return;
    window.__garageOutsideCloseWired = true;

    document.addEventListener('pointerdown', function(e){
      const panel = document.getElementById('garagePanel');
      const btn = document.getElementById('garageBtn');
      if(!panel || panel.hasAttribute('hidden')) return;
      if(panel.contains(e.target)) return;
      if(btn && btn.contains(e.target)) return;
      closeGarage();
    }, true);

    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape') closeGarage();
    });
  }

  function centerForecastStart(){
    const fc = document.getElementById('fcStrip');
    if(!fc) return;
    // Make sure the forecast starts after the logo instead of underneath it.
    fc.scrollLeft = 0;
  }

  function makeForecastDragScrollable(){
    const fc = document.getElementById('fcStrip');
    if(!fc || fc.__dragScrollReady) return;
    fc.__dragScrollReady = true;

    let down = false, startX = 0, startLeft = 0, moved = false;
    fc.addEventListener('pointerdown', function(e){
      if(e.pointerType === 'touch') return;
      down = true;
      moved = false;
      startX = e.clientX;
      startLeft = fc.scrollLeft;
      fc.classList.add('dragging');
      try { fc.setPointerCapture(e.pointerId); } catch(_) {}
    });

    fc.addEventListener('pointermove', function(e){
      if(!down) return;
      const dx = e.clientX - startX;
      if(Math.abs(dx) > 4) moved = true;
      fc.scrollLeft = startLeft - dx;
      if(moved) e.preventDefault();
    });

    function up(e){
      if(!down) return;
      down = false;
      fc.classList.remove('dragging');
      try { fc.releasePointerCapture(e.pointerId); } catch(_) {}
    }

    fc.addEventListener('pointerup', up);
    fc.addEventListener('pointercancel', up);
    fc.addEventListener('mouseleave', up);
  }

  function run(){
    wireGarageOutsideClose();
    makeForecastDragScrollable();
    centerForecastStart();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();

  [300, 900, 1800, 3500].forEach(ms => setTimeout(run, ms));
})();
</script>

<script id="locationTextClickFixScript">
(function(){
  function noDotLocationText(){
    const fc = document.getElementById('fcStrip') || document.querySelector('header .header-forecast');
    if(!fc) return;

    const loc = fc.querySelector('.fc-loc');
    if(!loc) return;

    loc.querySelectorAll('.dot,#netdot').forEach(dot => dot.remove());

    // Prefer the app-generated location text. Do not invent a new green dot.
    let city = loc.querySelector('.fc-city');
    if(!city){
      const raw = (loc.textContent || '').replace(/forecast unavailable/i, '').replace(/locating…/i, '').trim();
      if(raw){
        loc.textContent = '';
        city = document.createElement('span');
        city.className = 'fc-city';
        city.textContent = raw;
        loc.appendChild(city);
      }
    }
  }

  function installSafeForecastOverride(){
    if(typeof dailySummaryFromHourly !== 'function' || window.__safeForecastOverrideInstalled) return;
    window.__safeForecastOverrideInstalled = true;

    window.forecastChips = forecastChips = function(d, limit = 5, header = false){
      const days = d && d.daily;
      if(!days || !days.time) return "";
      let out = "";
      for(let i = 0; i < Math.min(limit, days.time.length); i++){
        const day = days.time[i];
        const dt = new Date(day + "T12:00");
        const lbl = header ? (i === 0 ? "Today" : dt.toLocaleDateString(undefined,{weekday:"short"})) : dt.toLocaleDateString(undefined,{weekday:"short"});
        const s = dailySummaryFromHourly(day, d.hourly, days.weather_code && days.weather_code[i]);
        const hi = Math.round(days.temperature_2m_max[i]);
        const lo = Math.round(days.temperature_2m_min[i]);

        if(header){
          out += '<span class="fc-day ' + s.cls + '"><span class="d">' + lbl + '</span> ' + s.wx.icon + ' <span class="t">' + hi + '°/' + lo + '°</span></span>';
        } else {
          out += '<span class="chip wx-outlook ' + s.cls + '"><span class="wx-day">' + lbl + '</span><span class="wx-icon">' + s.wx.icon + '</span><span class="wx-temp">' + lo + '-' + hi + '°</span></span>';
        }
      }
      return out;
    };
  }

  function restoreStartHere(){
    document.querySelectorAll('#rhAddStore,[data-store-route="start"]').forEach(btn => {
      const text = (btn.textContent || '').trim().toLowerCase();
      if(text === 'start from location' || text === 'start from this location'){
        btn.textContent = 'Start here';
        btn.title = 'Start here';
      }
    });
  }

  function hideVerified(){
    document.querySelectorAll('.titleline .badge').forEach(b => {
      if((b.textContent || '').trim().toUpperCase() === 'VERIFIED') b.remove();
    });
  }

  function cleanupForecastPercents(){
    document.querySelectorAll('header #fcStrip .fc-day .pop, header .header-forecast .fc-day .pop, .inline-forecast-card:not(.route-forecast) .chips .chip .pop, #iForecast .chips .chip .pop, #tForecast .chips .chip .pop')
      .forEach(el => el.remove());
  }

  function run(){
    installSafeForecastOverride();
    noDotLocationText();
    restoreStartHere();
    hideVerified();
    cleanupForecastPercents();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();

  // Light, non-blocking re-checks. No MutationObserver to avoid location-click freezes.
  [150, 500, 1000, 2000, 4000].forEach(ms => setTimeout(run, ms));

  document.addEventListener('click', function(){
    setTimeout(run, 120);
    setTimeout(run, 500);
  }, false);
})();
</script>

<script id="finalGarageIconsLineScript">
(function(){
  const CURRENT_ROUTE_ID = '__current_location_start__';

  function hasRouteStart(){
    try {
      return typeof tripSel !== 'undefined' && Array.isArray(tripSel) && tripSel.length > 0;
    } catch(e) {
      return false;
    }
  }

  function currentLocationLatLng(){
    if(typeof userPos !== 'undefined' && userPos){
      if(Array.isArray(userPos)) return userPos;
      if(typeof userPos.lat === 'number' && typeof userPos.lng === 'number') return [userPos.lat, userPos.lng];
      if(typeof userPos.latitude === 'number' && typeof userPos.longitude === 'number') return [userPos.latitude, userPos.longitude];
    }
    if(typeof currentPosition !== 'undefined' && currentPosition){
      if(Array.isArray(currentPosition)) return currentPosition;
      if(typeof currentPosition.lat === 'number' && typeof currentPosition.lng === 'number') return [currentPosition.lat, currentPosition.lng];
    }
    return null;
  }

  function selectedStore(){
    try {
      if(typeof selectedId !== 'undefined' && selectedId && typeof loc === 'function'){
        const s = loc(selectedId);
        if(s && s.id) return s;
      }
    } catch(e) {}
    return null;
  }

  async function startFromMyLocation(){
    const destination = selectedStore();
    if(!destination){
      if(typeof toast === 'function') toast('Select a location first');
      return;
    }

    let ll = currentLocationLatLng();
    if(!ll){
      if(typeof locateMe === 'function'){
        try {
          locateMe(false);
          if(typeof toast === 'function') toast('Getting your current location...');
        } catch(e) {}
      }
      setTimeout(startFromMyLocation, 900);
      return;
    }

    const currentStop = {
      id: CURRENT_ROUTE_ID,
      name: 'My location',
      store: 'ME',
      market: 'Current',
      address: 'Current location',
      lat: +ll[0],
      lng: +ll[1],
      current: true
    };

    try {
      if(typeof ROUTE_EXTRA_STOPS === 'undefined' || !ROUTE_EXTRA_STOPS) window.ROUTE_EXTRA_STOPS = {};
      ROUTE_EXTRA_STOPS[CURRENT_ROUTE_ID] = currentStop;

      tripSel = [CURRENT_ROUTE_ID, destination.id];
      tripRoute = null;

      if(typeof clearTripRouteMap === 'function') clearTripRouteMap(false);
      if(typeof refreshSelectedStoreRouteUI === 'function') refreshSelectedStoreRouteUI();

      if(typeof buildTrip === 'function') await buildTrip(null, {fit:false});
      else if(typeof showRouteHud === 'function') showRouteHud();

      removeMyLocationButton();
      if(typeof toast === 'function') toast('Route started from your location');
    } catch(e) {
      console.warn('My location route failed', e);
      if(typeof toast === 'function') toast('Could not start from your location');
    }
  }

  function removeMyLocationButton(){
    document.querySelectorAll('#rhStartCurrent').forEach(btn => btn.remove());
    document.querySelectorAll('.route-hud .rh-actions.glass-actions').forEach(actions => {
      actions.classList.remove('route-can-start-current');
      actions.classList.remove('show-current-start');
      actions.classList.remove('has-current-start');
    });
  }

  function ensureMyLocationButton(){
    const actions = document.querySelector('.route-hud .rh-actions.glass-actions');
    if(!actions) return;

    if(hasRouteStart()){
      removeMyLocationButton();
      return;
    }

    let btn = document.getElementById('rhStartCurrent');
    if(!btn){
      btn = document.createElement('button');
      btn.id = 'rhStartCurrent';
      btn.className = 'tinybtn primary';
      btn.type = 'button';
      actions.insertBefore(btn, actions.firstElementChild);
    }

    actions.classList.add('route-can-start-current');
    btn.textContent = 'My location';
    btn.title = 'Start route from my current location to this store';

    if(!btn.__finalCurrentStartWired){
      btn.__finalCurrentStartWired = true;
      btn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        startFromMyLocation();
      });
    }
  }

  function stripIconBoxes(){
    document.querySelectorAll('.quick-actions .iconbtn, .quick-actions button.iconbtn, button.iconbtn').forEach(btn => {
      btn.style.background = 'transparent';
      btn.style.backgroundColor = 'transparent';
      btn.style.backgroundImage = 'none';
      btn.style.border = '0';
      btn.style.outline = '0';
      btn.style.boxShadow = 'none';
      btn.style.borderRadius = '0';
      btn.style.backdropFilter = 'none';
      btn.style.webkitBackdropFilter = 'none';
      btn.style.overflow = 'visible';
    });
  }

  function prepGarageDefault(){
    document.querySelectorAll('#garagePanel .garage-opt[data-vehicle="default"] .veh-box > span, #garagePanel .garage-opt[data-vehicle="dot"] .veh-box > span, #garagePanel .garage-dot-preview, #garagePanel .dot-preview').forEach(el => {
      el.textContent = '54';
      el.setAttribute('aria-label', 'Default 54 icon');
      el.style.background = '#B5121B';
      el.style.boxShadow = 'none';
      el.style.filter = 'none';
    });
  }

  function cleanGarage(){
    document.querySelectorAll('#garagePanel .garage-opt, #garagePanel .veh-box').forEach(el => {
      el.style.background = 'transparent';
      el.style.backgroundColor = 'transparent';
      el.style.backgroundImage = 'none';
      el.style.border = '0';
      el.style.outline = '0';
      el.style.boxShadow = 'none';
      el.style.backdropFilter = 'none';
      el.style.webkitBackdropFilter = 'none';
    });
    document.querySelectorAll('#garagePanel .garage-opt img').forEach(img => {
      img.style.boxShadow = 'none';
      img.style.background = 'transparent';
      if(!img.closest('.garage-opt.on')) img.style.filter = 'none';
    });
    prepGarageDefault();
  }

  function run(){
    ensureMyLocationButton();
    stripIconBoxes();
    cleanGarage();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();

  [120, 400, 1000, 2200, 4200].forEach(ms => setTimeout(run, ms));

  document.addEventListener('click', function(){
    setTimeout(run, 80);
    setTimeout(run, 280);
  }, false);
})();
</script>

<script id="vehicleRotateGlowFinalScript">
(function(){
  const LABELS = {
    default: 'Default',
    dot: 'Default',
    f150: 'F-150',
    ram: 'Ram',
    lightning: 'Lightning',
    corvette: 'Corvette',
    delorean: 'DeLorean'
  };

  function normalizeVehicle(id){
    if(id === 'dot') return 'default';
    return LABELS[id] ? id : 'default';
  }

  function selectedVehicle(){
    return normalizeVehicle(window.__garageVehicleChoice || 'default');
  }

  function vehicleSource(id){
    id = normalizeVehicle(id);
    if(id === 'default') return '';
    const opt = document.querySelector('#garagePanel .garage-opt[data-vehicle="' + id + '"]');
    const img = opt && opt.querySelector('img');
    return img ? img.src : '';
  }

  function toPoint(v){
    if(!v) return null;
    if(Array.isArray(v) && Number.isFinite(+v[0]) && Number.isFinite(+v[1])) return {lat:+v[0], lng:+v[1]};
    if(Number.isFinite(+v.lat) && Number.isFinite(+v.lng)) return {lat:+v.lat, lng:+v.lng};
    if(Number.isFinite(+v.latitude) && Number.isFinite(+v.longitude)) return {lat:+v.latitude, lng:+v.longitude};
    return null;
  }

  function distMeters(a,b){
    if(typeof haversine === 'function') {
      try { return haversine(a,b); } catch(e) {}
    }
    const R = 6371000;
    const d = n => n * Math.PI / 180;
    const dLat = d(b.lat - a.lat);
    const dLng = d(b.lng - a.lng);
    const s = Math.sin(dLat/2)**2 + Math.cos(d(a.lat)) * Math.cos(d(b.lat)) * Math.sin(dLng/2)**2;
    return 2 * R * Math.asin(Math.sqrt(s));
  }

  function bearingDeg(a,b){
    const φ1 = a.lat * Math.PI / 180;
    const φ2 = b.lat * Math.PI / 180;
    const λ1 = a.lng * Math.PI / 180;
    const λ2 = b.lng * Math.PI / 180;
    const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
    const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  function routeTargets(){
    const out = [];
    try {
      if(typeof tripSel !== 'undefined' && Array.isArray(tripSel) && typeof loc === 'function'){
        tripSel.forEach(id => {
          const p = loc(id);
          const pt = toPoint(p);
          if(pt) out.push(Object.assign({}, p, pt));
        });
      }
    } catch(e) {}
    return out;
  }

  function selectedTarget(){
    try {
      if(typeof selectedId !== 'undefined' && selectedId && typeof loc === 'function'){
        const s = loc(selectedId);
        const pt = toPoint(s);
        if(pt) return Object.assign({}, s, pt);
      }
    } catch(e) {}
    return null;
  }

  function nextRouteTarget(from){
    const pts = routeTargets();

    if(pts.length){
      // Skip current-location placeholder and any stop already reached.
      for(const p of pts){
        if(p.current || p.id === '__current_location_start__') continue;
        if(distMeters(from, p) > 120) return p;
      }
      // If everything is within arrival distance, point at the last actual stop.
      for(let i = pts.length - 1; i >= 0; i--){
        const p = pts[i];
        if(!(p.current || p.id === '__current_location_start__')) return p;
      }
    }

    return selectedTarget();
  }

  function currentBearing(){
    const from = toPoint(typeof userPos !== 'undefined' ? userPos : null);
    if(!from) return 0;
    const target = nextRouteTarget(from);
    if(!target) return 0;
    return Math.round(bearingDeg(from, target));
  }

  function mapVehicleSize(){
    const z = (typeof map !== 'undefined' && map && map.getZoom) ? map.getZoom() : 10;
    // 20% smaller than previous 110–176 sizing.
    return Math.max(88, Math.min(141, Math.round((110 + (z - 7) * 9) * .8)));
  }

  function userIcon(kind){
    kind = normalizeVehicle(kind);
    const bearing = currentBearing();

    if(kind === 'default'){
      return L.divIcon({
        className: 'user-dot-marker',
        html: '<span class="udot">54</span>',
        iconSize: [30,30],
        iconAnchor: [15,15]
      });
    }

    const src = vehicleSource(kind);
    const size = mapVehicleSize();

    return L.divIcon({
      className: 'user-vehicle-marker',
      html: '<img src="' + src + '" alt="' + (LABELS[kind] || 'Vehicle') + '" style="--vehicle-bearing:' + bearing + 'deg">',
      iconSize: [size, size],
      iconAnchor: [Math.round(size / 2), Math.round(size / 2)]
    });
  }

  window.setUserTruckMarker = setUserTruckMarker = function(latlng){
    if(typeof map === 'undefined' || !map || !latlng || typeof L === 'undefined') return;

        }

          icon,
          interactive: false,
          keyboard: false,
          zIndexOffset: 1600
        }).addTo(map);
      } else {
        userMarker.setLatLng([pt.lat, pt.lng]);
        userMarker.setIcon(icon);
      }
    } catch(e) {
      console.warn('Vehicle marker update failed', e);
    }
  };

  window.refreshUserTruckMarkerSize = refreshUserTruckMarkerSize = function(){
    if(typeof userPos !== 'undefined' && userPos) window.setUserTruckMarker(userPos);
  };

  function prepGarageDefault(){
    document.querySelectorAll('#garagePanel .garage-opt[data-vehicle="default"] .veh-box > span, #garagePanel .garage-opt[data-vehicle="dot"] .veh-box > span, #garagePanel .garage-dot-preview, #garagePanel .dot-preview').forEach(el => {

  document.addEventListener('click', function(){

  }, false);

    try { map.off('zoomend', window.refreshUserTruckMarkerSize); } catch(e) {}
    try { map.on('zoomend', window.refreshUserTruckMarkerSize); } catch(e) {}
  }
})();

<script id="garageSheetFinalPolishScript">
(function(){
  function prepGarage(){
    const title = document.querySelector('#garagePanel .garage-title');
    if(title) title.textContent = 'Garage';

    document.querySelectorAll('#garagePanel .garage-opt[data-vehicle="default"] .veh-box > span, #garagePanel .garage-opt[data-vehicle="dot"] .veh-box > span, #garagePanel .garage-dot-preview, #garagePanel .dot-preview').forEach(el => {
      el.textContent = '54';
      el.style.color = '#050505';
      el.style.fontWeight = '950';
      el.style.animation = el.closest('.garage-opt.on') ? 'garageDefaultSamePulse 2.2s ease-in-out infinite' : '';
    });
  }

  function hideSheetClose(){
    document.querySelectorAll('.sheet .xbtn,.store-sheet .xbtn,.side-sheet .xbtn,.sheet-head .xbtn,#closeSheet,#sheetClose').forEach(btn => {
      btn.style.display = 'none';
    });
  }

  function makeDragScrollable(el){
    if(!el || el.__dragScrollReady) return;
    el.__dragScrollReady = true;

    let down = false;
    let startY = 0;
    let startTop = 0;
    let moved = false;

    el.addEventListener('pointerdown', function(e){
      if(e.pointerType === 'touch') return;
      if(e.button !== undefined && e.button !== 0) return;
      const interactive = e.target.closest && e.target.closest('button,a,input,select,textarea,[contenteditable="true"],.tabs,.tab');
      if(interactive) return;

      down = true;
      moved = false;
      startY = e.clientY;
      startTop = el.scrollTop;
      el.classList.add('dragging');
      try { el.setPointerCapture(e.pointerId); } catch(_) {}
    });

    el.addEventListener('pointermove', function(e){
      if(!down) return;
      const dy = e.clientY - startY;
      if(Math.abs(dy) > 3) moved = true;
      el.scrollTop = startTop - dy;
      if(moved) e.preventDefault();
    });

    function end(e){
      if(!down) return;
      down = false;
      el.classList.remove('dragging');
      try { el.releasePointerCapture(e.pointerId); } catch(_) {}
    }

    el.addEventListener('pointerup', end);
    el.addEventListener('pointercancel', end);
    el.addEventListener('mouseleave', end);
  }

  function getOpenSheet(){
    const candidates = Array.from(document.querySelectorAll('.sheet,.store-sheet,.side-sheet,#sheet'));
    return candidates.find(el => {
      const cs = getComputedStyle(el);
      const rect = el.getBoundingClientRect();
      return cs.display !== 'none' && cs.visibility !== 'hidden' && rect.width > 40 && rect.height > 40 && !el.hidden;
    });
  }

  function wireOutsideClose(){
    if(window.__sheetOutsideCloseFinalReady) return;
    window.__sheetOutsideCloseFinalReady = true;

    document.addEventListener('pointerdown', function(e){
      const sheet = getOpenSheet();
      if(!sheet) return;
      if(sheet.contains(e.target)) return;
      if(e.target.closest && e.target.closest('#garagePanel,#garageBtn,.leaflet-control,.route-hud,.toast')) return;

      if(typeof closeSheet === 'function') {
        closeSheet();
      } else {
        sheet.hidden = true;
        sheet.style.display = 'none';
      }
    }, true);
  }

  function run(){
    prepGarage();
    hideSheetClose();
    document.querySelectorAll('.sheet,.store-sheet,.side-sheet,#sheet').forEach(makeDragScrollable);
    wireOutsideClose();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);

})();
</script>

<script id="garageMobileFitScript">
(function(){
  function findToolbarBottom(){
    const selectors = [
      '.controls',
      '.filterbar',
      '.marketbar',
      '.market-row',
      '.top-controls',
      '.quick-actions',
      '#controls',
      '#map'
    ];

    let best = null;
    for (const sel of selectors) {
      const el = document.querySelector(sel);
      if (!el) continue;
      const r = el.getBoundingClientRect();
      if (r.width > 0 && r.height > 0) {
        if (!best || r.bottom > best.bottom) best = r;
      }
    }

    if (best && best.bottom < window.innerHeight - 80) {
      return Math.max(92, Math.round(best.bottom + 8));
    }
    return Math.min(360, Math.max(116, Math.round(window.innerHeight * 0.31)));
  }

  function fitGaragePanel(){
    const panel = document.getElementById('garagePanel');
    if (!panel) return;

    document.documentElement.style.setProperty('--garage-mobile-top', findToolbarBottom() + 'px');

    if (window.matchMedia && window.matchMedia('(max-width: 980px)').matches) {
      panel.style.position = 'fixed';
      panel.style.left = 'max(8px, env(safe-area-inset-left))';
      panel.style.right = 'max(8px, env(safe-area-inset-right))';
      panel.style.width = 'auto';
      panel.style.maxWidth = 'none';
      panel.style.minWidth = '0';
      panel.style.transform = 'none';
      panel.style.zIndex = '5000';

      const strip = panel.querySelector('#garageStrip,.garage-strip');
      if (strip) {
        strip.style.justifyContent = 'flex-start';
        strip.style.overflowX = 'auto';
        strip.style.overflowY = 'hidden';
        strip.style.maxWidth = '100%';
      }
    }
  }

  function resetGarageScroll(){
    const strip = document.querySelector('#garagePanel #garageStrip, #garagePanel .garage-strip');
    if (strip && window.matchMedia && window.matchMedia('(max-width: 980px)').matches) {
      strip.scrollLeft = 0;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fitGaragePanel);
  } else {
    fitGaragePanel();
  }

  window.addEventListener('resize', fitGaragePanel, {passive:true});
  window.addEventListener('orientationchange', function(){
    setTimeout(fitGaragePanel, 120);
    setTimeout(resetGarageScroll, 180);
  }, {passive:true});

  [100, 350, 900, 1800, 3200].forEach(ms => setTimeout(fitGaragePanel, ms));

  document.addEventListener('click', function(e){
    if (e.target.closest && (e.target.closest('#garageBtn') || e.target.closest('#garagePanel'))) {
      setTimeout(fitGaragePanel, 30);
      setTimeout(resetGarageScroll, 70);
      setTimeout(fitGaragePanel, 260);
    }
  }, true);
})();
</script>

<script id="mobileWeatherHeaderFitScript">
(function(){
  function bestHeader(){
    const fc = document.getElementById('fcStrip') || document.querySelector('.header-forecast,.fcstrip');
    if(!fc) return null;
    return fc.closest('.brandbar,.topbar,.app-header,header') || fc.parentElement;
  }

  function fitForecast(){
    const fc = document.getElementById('fcStrip') || document.querySelector('.header-forecast,.fcstrip');
    const header = bestHeader();
    if(!fc || !header) return;

    if(!(window.matchMedia && window.matchMedia('(max-width: 980px)').matches)) return;

    const headerRect = header.getBoundingClientRect();
    const logo = document.querySelector('.brand img,.logo-wrap img,.header-logo img,.brand-logo img,.brand,.logo-wrap,.header-logo,.brand-logo');
    const time = document.querySelector('.wxnow,.weather-now,.timebox,#wxNow');

    let leftEdge = headerRect.left + 8;
    let rightEdge = headerRect.right - 8;

    if(logo){
      const r = logo.getBoundingClientRect();
      if(r.width > 0) leftEdge = Math.max(leftEdge, r.right + 10);
    }

    if(time){
      const r = time.getBoundingClientRect();
      if(r.width > 0) rightEdge = Math.min(rightEdge, r.left - 10);
    }

    const available = Math.max(150, Math.floor(rightEdge - leftEdge));
    fc.style.width = available + 'px';
    fc.style.maxWidth = available + 'px';
    fc.style.marginLeft = 'auto';
    fc.style.marginRight = 'auto';
    fc.style.justifyContent = 'center';
    fc.style.overflow = 'hidden';

    // Hide any leftover percentage/precip nodes if the data renderer adds them later.
    fc.querySelectorAll('.precip,[class*="pop"]').forEach(el => {
      el.style.display = 'none';
    });

    // If the strip still overflows, slightly tighten gaps but do not push it off center.
    if(fc.scrollWidth > fc.clientWidth + 4){
      fc.style.gap = window.innerWidth < 720 ? '6px' : '8px';
    }
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fitForecast);
  else fitForecast();

  window.addEventListener('resize', fitForecast, {passive:true});
  window.addEventListener('orientationchange', () => setTimeout(fitForecast, 150), {passive:true});
  [150, 500, 1100, 2500, 5000].forEach(ms => setTimeout(fitForecast, ms));
})();
</script>

<script id="satxMarketLabelPatch">
(function(){
  function changeSatToSatx(root){
    root = root || document;

    // Market tabs/buttons keep data-market/value as SAT for filtering, only display SATX.
    root.querySelectorAll('[data-market="SAT"], [data-value="SAT"], button, .market, .market-tab, .tab, option').forEach(el => {
      const txt = (el.textContent || '').trim();
      if (txt === 'SAT') el.textContent = 'SATX';

      // Preserve any small store count spans, e.g. SAT 9 -> SATX 9.
      el.childNodes && el.childNodes.forEach(node => {
        if (node.nodeType === Node.TEXT_NODE && node.nodeValue.trim() === 'SAT') {
          node.nodeValue = node.nodeValue.replace('SAT', 'SATX');
        }
      });
    });

    // Fallback for compact market text with count: "SAT 9" -> "SATX 9"
    root.querySelectorAll('.markets, .marketbar, .filterbar, .controls, header').forEach(el => {
      el.childNodes.forEach(node => {
        if (node.nodeType === Node.TEXT_NODE) {
          node.nodeValue = node.nodeValue.replace(/\bSAT\b/g, 'SATX');
        }
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => changeSatToSatx(document));
  } else {
    changeSatToSatx(document);
  }

  [150, 500, 1200, 2500, 5000].forEach(ms => setTimeout(() => changeSatToSatx(document), ms));

  const mo = new MutationObserver(muts => {
    for (const m of muts) {
      m.addedNodes && m.addedNodes.forEach(n => {
        if (n.nodeType === 1) changeSatToSatx(n);
      });
    }
  });

  if (document.documentElement) {
    mo.observe(document.documentElement, {childList:true, subtree:true});
  }
})();
</script>

<script id="panelWeatherReadableScript">
(function(){
  function textOf(el){
    return (el && el.textContent || '').replace(/\s+/g,' ').trim().toLowerCase();
  }

  function removeNearbyBlocks(root){
    root = root || document;
    const candidates = root.querySelectorAll ? root.querySelectorAll('#sheet section, #sheet .section, #sheet .card, #sheet .panel, #sheet .block, .store-sheet section, .store-sheet .section, .store-sheet .card, .store-sheet .panel, .store-sheet .block') : [];
    candidates.forEach(el => {
      const t = textOf(el);
      if (t.startsWith('nearby') || /^nearby\b/.test(t)) {
        el.style.display = 'none';
        el.setAttribute('data-hidden-nearby','1');
      }
    });

    root.querySelectorAll && root.querySelectorAll('#sheet h1,#sheet h2,#sheet h3,#sheet h4,#sheet .heading,#sheet .section-title,.store-sheet h1,.store-sheet h2,.store-sheet h3,.store-sheet h4,.store-sheet .heading,.store-sheet .section-title').forEach(h => {
      if (textOf(h) === 'nearby') {
        let el = h.parentElement;
        while (el && el !== document.body) {
          const cls = el.className ? String(el.className).toLowerCase() : '';
          if (/section|card|panel|block|nearby/.test(cls) || el.tagName === 'SECTION') {
            el.style.display = 'none';
            el.setAttribute('data-hidden-nearby','1');
            return;
          }
          el = el.parentElement;
        }
        h.style.display = 'none';
      }
    });
  }

  function fixMetricText(root){
    root = root || document;

    // Expand common truncated labels.
    root.querySelectorAll && root.querySelectorAll('#sheet *, .store-sheet *').forEach(el => {
      const t = (el.textContent || '').trim();
      if (t === 'FROM YOU') el.innerHTML = 'FROM<br>YOU';
      if (t === 'DRIVE TIME') el.innerHTML = 'DRIVE<br>TIME';
      if (t === 'WEATHER NOW') el.innerHTML = 'WEATHER<br>NOW';
      if (t === 'WIND') el.textContent = 'WIND';
    });

    // If metric values were visibly truncated with ellipses, remove CSS truncation inline.
    root.querySelectorAll && root.querySelectorAll('#sheet .stat, #sheet .fact, #sheet .metric, #sheet .stat-card, #sheet .fact-card, #sheet .metric-card, #sheet .info-card, .store-sheet .stat, .store-sheet .fact, .store-sheet .metric, .store-sheet .stat-card, .store-sheet .fact-card, .store-sheet .metric-card, .store-sheet .info-card').forEach(card => {
      card.style.overflow = 'visible';
      card.style.height = 'auto';
      card.style.minHeight = window.innerWidth < 760 ? '76px' : '82px';
      card.querySelectorAll('*').forEach(child => {
        child.style.overflow = 'visible';
        child.style.textOverflow = 'clip';
      });
    });
  }

  function run(){
    removeNearbyBlocks(document);
    fixMetricText(document);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();

  [100, 350, 900, 1800, 3200, 5000].forEach(ms => setTimeout(run, ms));

  const mo = new MutationObserver(() => run());
  if (document.documentElement) {
    mo.observe(document.documentElement, {childList:true, subtree:true});
  }
})();
</script>

  function firstRect(selectors){

    const selectors = ['.controls','.filterbar','.marketbar','.market-row','.top-controls','#controls'];

      if(strip){
        strip.style.width = '100%';
        strip.style.maxWidth = '100%';
        strip.style.overflowX = 'auto';
        strip.style.overflowY = 'hidden';
        strip.style.justifyContent = 'flex-start';
      }
    }
  }

  function clearBoxes(){
    const selectors = [
      '.wxnow','#wxNow','.weather-now','.timebox','.nowbox','.clockbox','.time-temp','.header-time','.current-weather',
      '.fcstrip','#fcStrip','.header-forecast','.forecast-strip','.forecast-top','.forecast-head','.top-forecast'
    ];
    document.querySelectorAll(selectors.join(',')).forEach(el => {
      el.style.background = 'transparent';
      el.style.backgroundColor = 'transparent';
      el.style.backgroundImage = 'none';
      el.style.border = '0';
      el.style.outline = '0';
      el.style.boxShadow = 'none';
      el.style.backdropFilter = 'none';
      el.style.webkitBackdropFilter = 'none';
    });

    document.querySelectorAll('.wxnow *,#wxNow *,.weather-now *,.timebox *,.nowbox *,.clockbox *,.fcstrip *,#fcStrip *,.header-forecast *,.forecast-strip *,.top-forecast *').forEach(el => {
      el.style.background = 'transparent';
      el.style.backgroundColor = 'transparent';
      el.style.backgroundImage = 'none';
      el.style.boxShadow = 'none';
      el.style.borderColor = 'transparent';
    });
  }

  function moveForecastTowardLogo(){
    const fc = document.getElementById('fcStrip') || document.querySelector('.header-forecast,.fcstrip,.forecast-strip,.top-forecast');
    if(!fc || !(window.matchMedia && window.matchMedia('(max-width: 980px)').matches)) return;

    const logo = firstRect(['.brand img','.logo-wrap img','.header-logo img','.brand-logo img','.logo img','.brand','.logo-wrap','.header-logo','.brand-logo','.logo']);
    const time = firstRect(['.wxnow','#wxNow','.weather-now','.timebox','.nowbox','.clockbox','.time-temp','.header-time','.current-weather']);

    let left = 10;
    let right = 8;
    if(logo) left = Math.max(8, Math.round(logo.right + 6));
    if(time) right = Math.max(8, Math.round(window.innerWidth - time.left + 6));

    document.documentElement.style.setProperty('--forecast-left-edge', left + 'px');
    document.documentElement.style.setProperty('--forecast-right-edge', right + 'px');

    fc.style.position = 'absolute';
    fc.style.left = left + 'px';
    fc.style.right = right + 'px';
    fc.style.width = 'auto';
    fc.style.maxWidth = 'none';
    fc.style.margin = '0';
    fc.style.justifyContent = 'center';
    fc.style.overflow = 'hidden';
    fc.style.background = 'transparent';
    fc.style.boxShadow = 'none';
    fc.style.border = '0';

    fc.querySelectorAll('.precip,[class*="pop"]').forEach(el => el.style.display = 'none');
    if(fc.scrollWidth > fc.clientWidth + 4) fc.style.gap = window.innerWidth < 720 ? '5px' : '8px';
  }

  function applyAll(){
    forceCenterGarage();
    clearBoxes();
    moveForecastTowardLogo();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', applyAll);
  else applyAll();

  window.addEventListener('resize', applyAll, {passive:true});
  window.addEventListener('orientationchange', () => {
    setTimeout(applyAll, 120);
    setTimeout(applyAll, 350);
  }, {passive:true});

  [80, 240, 600, 1200, 2500, 5000, 8000].forEach(ms => setTimeout(applyAll, ms));

  document.addEventListener('click', function(e){
    if(e.target.closest && (e.target.closest('#garageBtn') || e.target.closest('#garagePanel'))){
      setTimeout(applyAll, 30);
      setTimeout(applyAll, 180);
      setTimeout(applyAll, 520);
    }
  }, true);

  const mo = new MutationObserver(() => applyAll());
  if(document.documentElement) mo.observe(document.documentElement, {childList:true, subtree:true});
})();
</script>

</body>
</html>
