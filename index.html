<!DOCTYPE html>
<!-- Single-file embedded build: truck marker and app icons are embedded as data URIs. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>54th Street Travel Map · Classic Weather</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<style>
:root{
  --ink:#1A2230;--panel:#fff;--panel-2:#F4F6F9;--hair:#E2E7EE;
  --muted:#5B6675;--brass:#B26F12;--brass-mid:#d97706;--brass-soft:#FBEFD9;
  --live:#1F9D6B;--live-bg:#ecfdf5;--alert:#D64545;--alert-bg:#fef2f2;
  --info:#2F6FBF;--info-bg:#eff6ff;
  --kc:#C8801E;--stl:#2F6FBF;--sat:#7A4FB5;--dfw:#1F9D6B;--aus:#D64545;--lab:#5B6675;
  --shadow:0 6px 24px rgba(20,30,45,.14);--shadow-sm:0 2px 8px rgba(20,30,45,.1);
  --radius:14px;--radius-sm:9px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:var(--sans);color:var(--ink);background:var(--panel-2);-webkit-text-size-adjust:100%}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
.mono{font-family:var(--mono)}
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

/* Header */
header{display:flex;flex-direction:column;background:linear-gradient(135deg,#1A2230 0%,#232d3f 100%);color:#fff;z-index:1200;box-shadow:0 2px 12px rgba(0,0,0,.22)}
.h-main{display:flex;align-items:center;gap:10px;padding:10px 12px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;white-space:nowrap}
.brand .mk{font-family:var(--mono);background:var(--brass);color:#fff;border-radius:7px;padding:3px 7px;font-size:13px;font-weight:700}
.brand small{display:block;font-weight:500;font-size:11px;color:#aeb8c6;letter-spacing:.3px;margin-top:1px}
.grow{flex:1}
.iconbtn{background:#262f3d;border:1px solid #333d4d;color:#dfe5ee;border-radius:10px;width:42px;height:42px;display:grid;place-items:center;font-size:18px;position:relative;transition:background .15s,transform .1s}
.iconbtn.active{background:var(--brass);border-color:var(--brass);color:#fff}
.iconbtn:active{transform:scale(.93)}
.iconbtn .bdot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;background:var(--alert);border:2px solid #1A2230}
.dot{width:8px;height:8px;border-radius:50%;background:var(--live);display:inline-block;vertical-align:middle}
.dot.off{background:var(--alert)}
.hscroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.hscroll::-webkit-scrollbar{display:none}

/* Weather banner */
.wxnow{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;margin-right:2px;min-width:58px}
.wxnow .clock{font-family:var(--mono);font-size:14px;font-weight:700;color:#fff}
.wxnow .tnow{font-size:12px;color:#cfd6e0;white-space:nowrap}
.wxnow .tnow #wxTemp{font-family:var(--mono);font-weight:700;color:#fff}

/* Forecast strip */
.fcstrip{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#141c28;color:#dfe5ee;white-space:nowrap;border-top:1px solid #1e2a38}
.fc-loc{font-size:12px;color:#aeb8c6;font-weight:600;flex:0 0 auto;display:flex;align-items:center;gap:6px;padding-right:8px;border-right:1px solid #2a3340;margin-right:2px}
.fc-day{flex:0 0 auto;display:flex;align-items:center;gap:5px;font-size:13px;background:#1e2a38;border:1px solid #2a3848;border-radius:999px;padding:5px 12px}
.fc-day .d{color:#aeb8c6;font-weight:600}
.fc-day .t{font-family:var(--mono);font-weight:700;color:#fff}

/* Incident ticker */
.ticker{background:#7c2d12;color:#fed7aa;font-size:13px;font-weight:600;padding:6px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.ticker .ticker-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

/* Controls */
.controls{background:var(--panel);border-bottom:1px solid var(--hair);padding:9px 12px 8px;z-index:1100}
.ctop{display:flex;gap:8px;margin-bottom:8px}
.ctop input{flex:1;height:44px;border:1px solid var(--hair);border-radius:12px;padding:0 14px;background:var(--panel-2);transition:border-color .15s,box-shadow .15s}
.ctop input:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(178,111,18,.15)}
.ctop .iconbtn{flex:0 0 44px;background:var(--panel-2);border:1px solid var(--hair);color:var(--ink)}
.ctop .iconbtn.active{background:var(--brass);border-color:var(--brass);color:#fff}
.pillrow{display:flex;gap:7px}
.pill{flex:0 0 auto;border:1.5px solid var(--hair);background:var(--panel-2);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;white-space:nowrap;transition:background .15s,border-color .15s,color .15s}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pill .ct{font-size:11px;font-family:var(--mono);opacity:.7;margin-left:2px}
.dpill{flex:0 0 auto;border:1.5px dashed var(--hair);background:transparent;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;transition:all .15s}
.dpill.on{background:var(--info-bg);color:var(--info);border-color:var(--info);border-style:solid}
.filter-sep{width:1px;height:22px;background:var(--hair);flex:0 0 1px;margin:0 2px;align-self:center}

/* Radar overlay */
.radar-clock{position:absolute;left:12px;bottom:12px;z-index:900;background:rgba(20,30,45,.85);color:#fff;font-family:var(--mono);font-size:12px;font-weight:700;padding:6px 10px;border-radius:9px;box-shadow:var(--shadow);pointer-events:none}
.radar-clock b{color:var(--brass-mid)}
.radar-playbtn{position:absolute;left:12px;bottom:50px;z-index:901;background:rgba(20,30,45,.85);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:9px;width:36px;height:36px;display:grid;place-items:center;font-size:14px;cursor:pointer;transition:background .15s}
.radar-playbtn:hover{background:rgba(20,30,45,.95)}

/* Map */
.stage{position:relative;flex:1;min-height:0}
#map{position:absolute;inset:0;background:#dde3ea}
.leaflet-container{font-family:var(--sans)}
.mapctl{position:absolute;right:12px;z-index:900;display:flex;flex-direction:column;gap:8px}
.mapctl.top{top:12px}
.mapctl .iconbtn{background:#fff;border:1px solid var(--hair);color:var(--ink);box-shadow:var(--shadow-sm)}
.mapctl .iconbtn.active{background:var(--brass);color:#fff;border-color:var(--brass)}

/* Cluster styling */
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(178,111,18,.25)!important;border-color:rgba(178,111,18,.5)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:var(--brass)!important;color:#fff!important;font-weight:800;font-family:var(--mono);font-size:13px}

/* Pins */
.pin{width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:grid;place-items:center}
.pin span{transform:rotate(45deg);font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;line-height:1}
.pin.fav{outline:3px solid var(--brass-mid);outline-offset:1px}
.pin.upcoming{opacity:.55;border-style:dashed}

/* Bottom sheet */
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--panel);border-radius:18px 18px 0 0;box-shadow:0 -8px 36px rgba(20,30,45,.2);z-index:1000;max-height:85%;display:flex;flex-direction:column;transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.7,.2,1)}
.sheet.open{transform:translateY(0)}
.grip{height:5px;width:44px;background:var(--hair);border-radius:3px;margin:10px auto 0;flex:0 0 auto}
.closex{position:absolute;right:12px;top:10px;background:var(--panel-2);border:1px solid var(--hair);border-radius:50%;width:34px;height:34px;font-size:16px;display:grid;place-items:center;z-index:10}

/* Sheet head */
.sheet-head{padding:8px 50px 0 16px;flex:0 0 auto}
.titleline{display:flex;align-items:flex-start;gap:10px}
.titleline h2{margin:0;font-size:19px;line-height:1.2;flex:1}
.badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;color:#fff;white-space:nowrap;flex:0 0 auto}
.badge.approx{background:var(--alert)}
.badge.ok{background:var(--live)}
.badge.upcoming{background:var(--info)}
.sub{color:var(--muted);font-size:13px;margin-top:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.open-pill{font-size:12px;font-weight:700;border-radius:999px;padding:2px 9px;display:inline-flex;align-items:center;gap:4px}
.open-pill.open{background:var(--live-bg);color:var(--live)}
.open-pill.closed{background:var(--alert-bg);color:var(--alert)}
.open-pill.unknown{background:var(--panel-2);color:var(--muted)}

/* Sheet tabs */
.sheet-tabs{display:flex;padding:10px 16px 0;border-bottom:2px solid var(--hair);flex:0 0 auto;gap:0}
.stab{flex:1;height:40px;font-weight:700;font-size:14px;color:var(--muted);background:none;position:relative;bottom:-2px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.stab.on{color:var(--brass);border-bottom-color:var(--brass)}
.sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.tab-pane{padding:12px 16px 28px;display:none}
.tab-pane.active{display:block}

/* Fields */
.field{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--hair);align-items:baseline}
.field .k{width:88px;flex:0 0 88px;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding-top:2px}
.field .v{flex:1;font-size:15px;word-break:break-word}
.field .v a{color:var(--info);text-decoration:none;font-weight:600}
.empty{color:var(--muted);font-style:italic;font-size:14px}
.internal-tag{font-size:10px;font-family:var(--mono);background:var(--brass-soft);color:var(--brass);padding:2px 6px;border-radius:5px;margin-left:4px;vertical-align:middle}
.sech{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:800;margin:18px 0 8px}
.notice{background:var(--brass-soft);border:1px solid #f0dcae;color:#7a4d09;border-radius:11px;padding:11px 13px;font-size:13px;line-height:1.5;margin:8px 0}
.notice b{color:#5e3a05}
.notice.info-box{background:var(--info-bg);border-color:#bfdbfe;color:#1e40af}

/* Action buttons */
.actions{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.btn{flex:1;min-width:100px;height:46px;border-radius:12px;border:1.5px solid var(--hair);background:var(--panel-2);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s,opacity .15s}
.btn.primary{background:var(--brass);border-color:var(--brass);color:#fff}
.btn.live{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.danger{color:var(--alert);border-color:#f0c9c9}
.btn:active{transform:scale(.97)}
.navrow{display:flex;gap:8px}
.navrow .btn{height:42px;min-width:0}

/* Nearby */
.catrow{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.catrow::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;border:1.5px solid var(--hair);background:var(--panel-2);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;white-space:nowrap;transition:background .15s,border-color .15s}
.cat.on{background:var(--brass);color:#fff;border-color:var(--brass)}
.placescroll{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 0 6px;scroll-snap-type:x proximity}
.placescroll::-webkit-scrollbar{display:none}
.placecard{flex:0 0 200px;scroll-snap-align:start;display:flex;flex-direction:column;justify-content:space-between;gap:8px;padding:12px;border:1px solid var(--hair);border-radius:12px;background:var(--panel-2);min-height:96px}
.placecard .nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.placecard .meta{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.4}
.placecard .go{background:#fff;border:1px solid var(--hair);border-radius:9px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--info);text-decoration:none;font-size:13px}
.hint{color:var(--muted);font-size:13px;padding:10px 0;line-height:1.5}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--hair);border-top-color:var(--brass);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Travel stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.stat{background:var(--panel-2);border:1px solid var(--hair);border-radius:12px;padding:12px 12px 10px;position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.stat.dist::before{background:var(--info)}
.stat.time::before{background:var(--brass)}
.stat.temp::before{background:var(--live)}
.stat.cond::before{background:var(--sat)}
.stat .n{font-family:var(--mono);font-size:22px;font-weight:700}
.stat .l{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.stat.warn .n{color:var(--alert)}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.chip{background:var(--panel-2);border:1px solid var(--hair);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.chip b{font-family:var(--mono)}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(20,30,45,.5);z-index:2000;display:none;align-items:flex-end;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.modal.open{display:flex}
.modal .card{background:var(--panel);width:100%;max-height:90%;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:slide-up .25s cubic-bezier(.2,.7,.2,1)}
@keyframes slide-up{from{transform:translateY(32px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal .card .top{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--hair);flex:0 0 auto}
.modal .card .top h3{margin:0;font-size:18px;flex:1}
.modal .card .inner{overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
label.fl{display:block;font-size:11px;font-weight:800;color:var(--muted);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.5px}
.modal input,.modal select,.modal textarea{width:100%;border:1.5px solid var(--hair);border-radius:10px;padding:11px 12px;background:var(--panel-2)}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(178,111,18,.12)}
.modal textarea{min-height:80px;resize:vertical}
.row2{display:flex;gap:10px}.row2>*{flex:1}
.listitem{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--hair)}
.listitem .info{flex:1;min-width:0}
.listitem .nm{font-weight:700}
.listitem .sm{font-size:12px;color:var(--muted)}
.mk-chip{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;border-radius:6px;padding:2px 7px}
.tinybtn{border:1.5px solid var(--hair);background:var(--panel-2);border-radius:9px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer}
.tinybtn.danger{color:var(--alert);border-color:#f0c9c9}
.tinybtn.primary{background:var(--brass);border-color:var(--brass);color:#fff}
.seg{display:flex;background:var(--panel-2);border:1.5px solid var(--hair);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;border:none;background:transparent;border-radius:8px;height:38px;font-weight:700;color:var(--muted);cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(24px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;z-index:3000;opacity:0;transition:.25s;box-shadow:var(--shadow);max-width:90%;text-align:center;font-size:14px;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:780px){
  .sheet{left:auto;right:14px;bottom:14px;top:auto;width:430px;max-height:calc(100% - 120px);border-radius:18px}
  .modal{align-items:center;justify-content:center}
  .modal .card{max-width:560px;border-radius:18px;max-height:85vh}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
[hidden]{display:none!important}
.leaflet-control-attribution{font-size:10px}


/* Compact top chrome: reclaim vertical map space */
header{display:block}
.h-main{display:flex;align-items:center;gap:8px;padding:7px 10px;min-height:50px}
.brand{gap:7px;min-width:0;line-height:1.05}
.brand .mk{border-radius:6px;padding:2px 6px;font-size:12px}
.brand small{font-size:10px;letter-spacing:.25px;margin-top:0}
.iconbtn{width:38px;height:38px;border-radius:9px;font-size:16px;flex:0 0 38px}
.wxnow{min-width:50px;margin-right:0}
.wxnow .clock{font-size:13px}
.wxnow .tnow{font-size:11px}
.fcstrip{gap:6px;padding:5px 10px;min-height:33px}
.fc-loc{font-size:11px;padding-right:6px}
.fc-day{font-size:12px;padding:4px 9px}
.ticker{padding:5px 10px;font-size:12px}
.controls{padding:7px 10px 6px}
.ctop{gap:7px;margin-bottom:6px}
.ctop input{height:40px;border-radius:10px;padding:0 12px}
.ctop .iconbtn{flex-basis:40px;width:40px;height:40px}
.pillrow{gap:6px}
.pill,.dpill{padding:6px 11px;font-size:12px}
.filter-sep{height:20px}
.mapctl.top{top:10px}
.mapctl{right:10px;gap:7px}

@media(max-width:420px){
  .h-main{padding:6px 8px;gap:6px;min-height:46px}
  .brand{font-size:14px}
  .brand small{display:none}
  .brand .mk{font-size:11px;padding:2px 5px}
  .iconbtn{width:36px;height:36px;flex-basis:36px;font-size:15px}
  .wxnow{min-width:44px}
  .fcstrip{padding:4px 8px;min-height:30px}
  .fc-day{padding:3px 8px;font-size:11px}
  .controls{padding:6px 8px 5px}
  .ctop input{height:38px}
  .ctop .iconbtn{width:38px;height:38px;flex-basis:38px}
}


/* Toolbar pass: forecast beside clock; search beside market tabs; actions grouped */
.h-main{display:grid;grid-template-columns:auto minmax(150px,1fr) auto auto auto;align-items:center;gap:8px}
.brand{min-width:max-content}
.header-forecast{min-width:0;max-width:100%;background:rgba(20,28,40,.78);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:4px 7px;min-height:36px;overflow-x:auto}
.header-forecast .fc-loc{border-right:1px solid rgba(255,255,255,.14);margin-right:0;color:#c7d1de}
.header-forecast .fc-day{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1);padding:4px 9px}
.wxnow{align-items:flex-start;border-left:1px solid rgba(255,255,255,.12);padding-left:8px;min-width:54px}
.controls{padding:7px 10px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.filterbar{display:grid;grid-template-columns:minmax(180px,1fr) minmax(190px,280px) auto;align-items:center;gap:8px}
.filterbar .pillrow{min-width:0;overflow-x:auto;gap:6px}
.searchbox{min-width:0}
.searchbox input{width:100%;height:38px;border:1px solid var(--hair);border-radius:999px;padding:0 13px;background:var(--panel-2);font-weight:600}
.searchbox input:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(178,111,18,.15);background:#fff}
.quick-actions{display:flex;align-items:center;gap:6px;white-space:nowrap}
.quick-actions .iconbtn{width:38px;height:38px;flex:0 0 38px;background:var(--panel-2);border:1px solid var(--hair);color:var(--ink);box-shadow:none}
.quick-actions .iconbtn:hover{background:#fff}
.quick-actions .iconbtn.active{background:var(--brass);border-color:var(--brass);color:#fff}
.quick-actions .iconbtn.danger{color:var(--alert);background:var(--alert-bg);border-color:#f0c9c9}
.quick-actions .iconbtn.danger:hover{background:#fff5f5}
.layers-ico{position:relative;width:20px;height:18px;display:inline-block}
.layers-ico,.layers-ico:before,.layers-ico:after{border:2px solid currentColor;border-radius:4px;transform:skewY(-18deg)}
.layers-ico:before,.layers-ico:after{content:"";position:absolute;left:2px;right:-5px;height:10px;background:transparent}
.layers-ico:before{top:4px;opacity:.78}
.layers-ico:after{top:9px;opacity:.55}

.quick-actions .iconbtn.route{color:var(--info);background:var(--info-bg);border-color:#bfdbfe}
.quick-actions .iconbtn.route:hover{background:#fff}
.route-ico{position:relative;width:22px;height:22px;display:inline-block;color:currentColor}
.route-ico:before{content:"";position:absolute;left:5px;top:4px;width:11px;height:12px;border:2px solid currentColor;border-left-color:transparent;border-bottom-color:transparent;border-radius:12px 12px 12px 0;transform:rotate(33deg)}
.route-ico:after{content:"";position:absolute;left:2px;bottom:3px;width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:14px -13px 0 currentColor}
.trip-stopbar{display:flex;flex-direction:column;gap:7px;margin:8px 0 10px}
.trip-stop{display:grid;grid-template-columns:34px 1fr auto;gap:9px;align-items:center;padding:9px 10px;border:1px solid var(--hair);border-radius:12px;background:var(--panel-2)}
.trip-stop .num{font-family:var(--mono);font-weight:800;background:#fff;border:1px solid var(--hair);border-radius:9px;height:28px;display:grid;place-items:center;color:var(--brass)}
.trip-stop .name{font-weight:800;font-size:14px}
.trip-stop .meta{font-size:12px;color:var(--muted);margin-top:2px}
.route-toolgrid{display:grid;grid-template-columns:minmax(120px,1.2fr) minmax(86px,.7fr) minmax(112px,.9fr);gap:8px;margin-top:8px}
.route-toolgrid select{min-width:0}
.api-card{background:var(--panel-2);border:1px solid var(--hair);border-radius:13px;padding:11px 12px;margin:10px 0 12px}
.api-card-top{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}
.api-card-top b{display:block;font-size:14px}
.api-card-top small{display:block;color:var(--muted);font-size:12px;line-height:1.35;margin-top:2px}
.api-card-grid{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.api-card input{min-width:0;height:40px;border:1.5px solid var(--hair);border-radius:10px;padding:0 10px;background:#fff;font-family:var(--mono);font-size:12px}
.api-card input:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(178,111,18,.12)}
.api-mini{display:flex;justify-content:space-between;gap:8px;align-items:center;color:var(--muted);font-size:12px;margin-top:7px;line-height:1.35}
.api-mini b{color:var(--ink)}
.provider-pill{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.35px;color:var(--muted);background:var(--panel-2);border:1px solid var(--hair);border-radius:999px;padding:4px 8px;display:inline-flex;gap:5px;align-items:center}
.route-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.route-actions .btn{height:42px;min-width:120px}
.route-note{font-size:12px;color:var(--muted);line-height:1.45;margin-top:8px}
.route-search-progress{font-size:12px;color:var(--muted);line-height:1.45;margin-top:8px;background:var(--panel-2);border:1px solid var(--hair);border-radius:10px;padding:8px 10px}
.route-mile{font-family:var(--mono);font-weight:800;color:var(--ink)}
.route-hud{position:absolute;left:12px;right:12px;bottom:12px;z-index:940;background:rgba(255,255,255,.96);border:1px solid var(--hair);border-radius:15px;box-shadow:var(--shadow);padding:12px;max-width:520px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.route-hud .rh-top{display:flex;align-items:flex-start;gap:10px}
.route-hud .rh-title{font-weight:900;font-size:14px;line-height:1.25;flex:1}
.route-hud .rh-meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35}
.route-hud .rh-stops{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:8px 0 2px;-webkit-overflow-scrolling:touch}
.route-hud .rh-stops::-webkit-scrollbar{display:none}
.route-hud .rh-stop{flex:0 0 auto;font-size:12px;font-weight:800;background:var(--panel-2);border:1px solid var(--hair);border-radius:999px;padding:5px 9px;white-space:nowrap}
.route-hud .rh-actions{display:flex;gap:8px;margin-top:9px}
.route-hud .rh-actions .tinybtn{flex:1;text-align:center}
.route-stop-pin{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;border:3px solid #fff;box-shadow:0 2px 9px rgba(0,0,0,.36);display:grid;place-items:center;font-family:var(--mono);font-weight:900;font-size:12px}
.route-place-pin{width:26px;height:26px;border-radius:50%;background:var(--brass);color:#fff;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.32);display:grid;place-items:center;font-size:14px}
.route-stop-pin.via{background:var(--brass)}
.place-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:2px}
.place-actions .go,.place-actions .addroute{height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;text-decoration:none}
.place-actions .go{background:#fff;border:1px solid var(--hair);color:var(--info)}
.place-actions .addroute{background:var(--ink);border:1px solid var(--ink);color:#fff}
.place-actions .addroute:disabled{opacity:.45;cursor:not-allowed}
.route-popup{min-width:180px;font-family:var(--sans)}
.route-popup b{display:block;margin-bottom:4px}
.route-popup .meta{font-size:12px;color:var(--muted);line-height:1.35;margin-bottom:8px}
.route-popup .tinybtn{width:100%}
.store-route-card{background:#fff;border:1px solid var(--hair);border-radius:14px;padding:10px;margin:10px 0 12px;box-shadow:var(--shadow-sm)}
.store-route-top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:9px}
.store-route-top .route-ico{width:20px;height:20px;color:var(--info)}
.store-route-top b{display:block;font-size:14px;font-weight:900;line-height:1.15}
.store-route-top small{display:block;color:var(--muted);font-size:11px;line-height:1.25;margin-top:1px}
.store-route-chip{font-size:11px;font-weight:800;color:var(--info);background:var(--info-bg);border:1px solid #bfdbfe;border-radius:999px;padding:4px 8px;white-space:nowrap}
.store-route-status{font-size:12px;color:var(--muted);background:var(--panel-2);border:1px solid var(--hair);border-radius:10px;padding:7px 9px;margin:8px 0;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-route-status b{color:var(--ink)}
.store-route-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:7px}
.store-route-grid .tinybtn{height:34px;padding:0 8px;font-size:12px;display:flex;align-items:center;justify-content:center;text-align:center}
.store-route-add{display:grid;grid-template-columns:1fr auto;gap:7px;margin-top:8px}
.store-route-card select{width:100%;min-width:0;border:1.5px solid var(--hair);border-radius:10px;padding:8px 10px;background:var(--panel-2);color:var(--ink);font-size:13px}
.store-route-card select:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(178,111,18,.12);background:#fff}
.store-route-linkrow{display:flex;justify-content:flex-end;gap:10px;margin-top:7px}
.store-route-link{font-size:12px;font-weight:800;color:var(--muted);text-decoration:none;padding:4px 0}
.store-route-link.danger{color:var(--alert)}
@media(max-width:380px){.store-route-add{grid-template-columns:1fr}.store-route-grid{grid-template-columns:1fr 1fr}.store-route-grid .tinybtn:last-child{grid-column:1 / -1}}

.route-weather-box{background:var(--panel-2);border:1px solid var(--hair);border-radius:13px;padding:10px;margin:8px 0 12px}
.route-weather-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.route-weather-top b{font-size:14px;font-weight:900;display:block;line-height:1.2}
.route-weather-top small{font-size:12px;color:var(--muted);line-height:1.35;display:block;margin-top:2px}
.route-weather-icon{width:28px;height:28px;border-radius:9px;background:#fff;border:1px solid var(--hair);display:grid;place-items:center;flex:0 0 auto;font-size:16px}
.route-weather-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
.route-weather-card{background:#fff;border:1px solid var(--hair);border-radius:11px;padding:9px;min-width:0}
.route-weather-card.warn{border-color:#fed7aa;background:#fff7ed}
.route-weather-card.bad{border-color:#fecaca;background:#fef2f2}
.route-weather-card .where{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.35px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.route-weather-card .temp{font-family:var(--mono);font-size:20px;font-weight:900;line-height:1.25;margin-top:3px}
.route-weather-card .meta{font-size:12px;color:var(--muted);line-height:1.35;margin-top:3px}
.route-weather-summary{font-size:12px;line-height:1.45;margin-top:8px;color:var(--muted)}
.route-weather-summary b{color:var(--ink)}
.rh-weather{font-size:12px;color:var(--muted);background:var(--panel-2);border:1px solid var(--hair);border-radius:10px;padding:7px 9px;margin-top:8px;line-height:1.35}
.rh-weather b{color:var(--ink)}

.btn:disabled,.tinybtn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
@media(min-width:780px){.route-hud{left:12px;right:auto;bottom:12px;width:420px}}
@media(max-width:520px){.route-toolgrid{grid-template-columns:1fr}.route-actions .btn{min-width:0}.route-hud{bottom:10px;padding:10px}.route-hud .rh-actions{flex-wrap:wrap}.route-hud .rh-actions .tinybtn{min-width:120px}.route-weather-grid{grid-template-columns:1fr}.route-weather-card{display:grid;grid-template-columns:1fr auto;gap:5px 9px;align-items:center}.route-weather-card .temp{grid-row:1 / span 2;grid-column:2}.route-weather-card .meta{grid-column:1 / -1}}

#layerBtn .bdot{top:3px;right:3px}
.mapctl.top{display:none}

@media(max-width:760px){
  .h-main{grid-template-columns:auto minmax(90px,1fr) auto auto auto;gap:6px}
  .header-forecast{min-height:34px;padding:3px 6px;border-radius:10px}
  .header-forecast .fc-day{padding:3px 7px}
  .filterbar{grid-template-columns:minmax(128px,1fr) minmax(132px,34vw) auto;gap:6px}
  .searchbox input{height:36px;padding:0 11px;font-size:12px}
  .quick-actions{gap:5px}
  .quick-actions .iconbtn{width:36px;height:36px;flex-basis:36px;font-size:15px}
}

@media(max-width:430px){
  .h-main{grid-template-columns:auto minmax(72px,1fr) auto auto auto}
  .brand{font-size:13px}
  .header-forecast .fc-loc{max-width:88px;overflow:hidden;text-overflow:ellipsis}
  .filterbar{grid-template-columns:minmax(110px,1fr) minmax(116px,31vw) auto}
  .pill,.dpill{padding:6px 10px}
  .quick-actions .iconbtn{width:34px;height:34px;flex-basis:34px}
  .layers-ico{width:18px;height:16px}
}


/* 54th Street brand theme: warm drafthouse palette, red/gold accents, darker chrome */
:root{
  --ink:#211714;
  --panel:#FFF9EC;
  --panel-2:#F7EBD5;
  --hair:#E4D0AA;
  --muted:#6E6256;
  --brass:#B9770E;
  --brass-mid:#F2A51D;
  --brass-soft:#FFF0C7;
  --live:#2E7D32;
  --live-bg:#EDF8EA;
  --alert:#B5121B;
  --alert-bg:#FFF0EE;
  --info:#1C5A74;
  --info-bg:#EAF6F8;
  --kc:#B9770E;
  --stl:#B5121B;
  --sat:#6A432C;
  --dfw:#2E7D32;
  --aus:#E96322;
  --lab:#5B5147;
  --shadow:0 10px 28px rgba(36,22,14,.18);
  --shadow-sm:0 3px 10px rgba(36,22,14,.12);
}
html,body{background:linear-gradient(180deg,#fbf0d6 0%,#f6ead4 45%,#efe0c4 100%);}
header{
  background:
    radial-gradient(circle at 14% 0%,rgba(242,165,29,.23) 0,transparent 34%),
    linear-gradient(135deg,#17100d 0%,#231511 54%,#3B160F 100%);
  border-bottom:3px solid var(--brass-mid);
  box-shadow:0 4px 18px rgba(20,10,5,.36);
}
.h-main{min-height:56px;}
.brand{font-family:Georgia,"Times New Roman",serif;text-transform:uppercase;letter-spacing:.35px;color:#FFF2C9;text-shadow:0 2px 0 rgba(0,0,0,.45)}
.brand .mk{
  width:45px;height:38px;padding:0;border-radius:50%;display:grid;place-items:center;
  font-family:Georgia,"Times New Roman",serif;font-size:22px;font-weight:900;letter-spacing:-2px;color:#FFF2C9;
  background:linear-gradient(180deg,#F5B647 0%,#E96322 48%,#B5121B 100%);
  border:2px solid #120b08;box-shadow:0 0 0 2px #FFF2C9,0 3px 9px rgba(0,0,0,.32);
}
.brand small{font-family:var(--sans);font-weight:900;color:#F4C84A;letter-spacing:.8px;text-shadow:none}
.header-forecast{
  background:rgba(15,10,8,.64);border-color:rgba(244,200,74,.24);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}
.header-forecast .fc-loc{color:#F7DCA1;border-right-color:rgba(244,200,74,.25)}
.header-forecast .fc-day{background:rgba(255,242,201,.09);border-color:rgba(244,200,74,.22)}
.fc-day .d{color:#F7DCA1}.fc-day .t{color:#FFF9EC}
.wxnow{border-left-color:rgba(244,200,74,.25)}
.wxnow .clock{color:#FFF2C9}.wxnow .tnow{color:#F7DCA1}.wxnow .tnow #wxTemp{color:#FFF9EC}
.controls{
  background:linear-gradient(180deg,rgba(255,249,236,.98),rgba(247,235,213,.96));
  border-bottom:1px solid #d8bd8d;
  box-shadow:0 2px 8px rgba(36,22,14,.08);
}
.searchbox input,.ctop input,.modal input,.modal select,.modal textarea,.store-route-card select{
  background:#FFFDF8;border-color:#D9C194;color:var(--ink);
}
.searchbox input::placeholder,.ctop input::placeholder{color:#887767}
.searchbox input:focus,.ctop input:focus,.modal input:focus,.modal select:focus,.modal textarea:focus,.store-route-card select:focus{
  border-color:var(--alert);box-shadow:0 0 0 3px rgba(181,18,27,.16);background:#fff;
}
.pill,.dpill,.chip,.stat,.placecard,.route-search-progress,.route-weather-box,.rh-weather,.route-hud .rh-stop,.store-route-status,.api-card,.trip-stop{
  background:#FFFDF8;border-color:#DFC89E;
}
.pill.on{background:linear-gradient(180deg,#C8202A,#9D0F16);border-color:#9D0F16;color:#FFF9EC;box-shadow:0 2px 8px rgba(181,18,27,.22)}
.dpill.on{background:#FFF0C7;color:#8A4D06;border-color:#D69A2D}
.quick-actions .iconbtn,.iconbtn,.tinybtn,.btn{border-color:#D9C194;box-shadow:var(--shadow-sm)}
.quick-actions .iconbtn{background:#FFFDF8;color:#2B1B16}
.quick-actions .iconbtn:hover,.tinybtn:hover{background:#fff7e6}
.quick-actions .iconbtn.active,.btn.primary,.tinybtn.primary,.cat.on{
  background:linear-gradient(180deg,#CF8A12 0%,#A46208 100%);border-color:#8D5306;color:#FFF9EC;text-shadow:0 1px 0 rgba(0,0,0,.2);
}
.quick-actions .iconbtn.route{color:#B5121B;background:#FFF0C7;border-color:#E6BB5C}
.quick-actions .iconbtn.danger{color:#B5121B;background:#FFEDEA;border-color:#E8B7B2}
.btn.live,.place-actions .addroute{background:#211714;border-color:#211714;color:#FFF9EC}
.btn.danger,.tinybtn.danger,.store-route-link.danger{color:#B5121B;border-color:#E8B7B2}
.sheet,.modal .card,.route-hud{background:#FFF9EC;border-color:#DFC89E}
.sheet{box-shadow:0 -10px 36px rgba(36,22,14,.24)}
.sheet-head{background:linear-gradient(180deg,#FFF9EC 0%,#F7EBD5 100%);border-radius:18px 18px 0 0;padding-bottom:8px;border-bottom:1px solid #E4D0AA}
.titleline h2{font-family:Georgia,"Times New Roman",serif;letter-spacing:.1px;color:#211714}
.stab.on{color:#B5121B;border-bottom-color:#B5121B}
.field{border-bottom-color:#E4D0AA}.field .v a,.place-actions .go{color:#1C5A74}.sech{color:#6E6256;letter-spacing:1px}
.badge.ok{background:#2E7D32}.badge.approx,.badge.upcoming{background:#B5121B}.open-pill.open{background:#EDF8EA;color:#2E7D32}
.notice{background:#FFF0C7;border-color:#E7C46D;color:#744905}.notice.info-box{background:#EAF6F8;border-color:#B8DDE6;color:#164A61}
.internal-tag{background:#FFF0C7;color:#8A4D06;border:1px solid #E7C46D}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(181,18,27,.22)!important;border-color:rgba(181,18,27,.44)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:#B5121B!important;color:#FFF2C9!important;border:2px solid #FFF2C9!important}
.pin{border-color:#FFF2C9;box-shadow:0 2px 9px rgba(33,23,20,.45)}
.pin.fav{outline-color:#F2A51D}
.route-stop-pin{background:#211714;border-color:#FFF2C9}.route-stop-pin.via,.route-place-pin{background:#B5121B;color:#FFF2C9;border-color:#FFF2C9}
.radar-clock,.radar-playbtn{background:rgba(33,23,20,.9);border-color:rgba(244,200,74,.25);color:#FFF2C9}.radar-clock b{color:#F2A51D}
.toast{background:#211714;color:#FFF2C9;border:1px solid rgba(244,200,74,.25)}
.leaflet-control-zoom a{background:#FFF9EC!important;color:#211714!important;border-color:#DFC89E!important}
.store-route-card,.route-weather-card{background:#FFFDF8;border-color:#DFC89E}
.store-route-chip,.provider-pill{background:#FFF0C7;color:#8A4D06;border-color:#E7C46D}
.route-weather-card.warn{border-color:#F2A51D;background:#FFF8E8}.route-weather-card.bad{border-color:#E8B7B2;background:#FFF0EE}
@media(max-width:420px){.brand .mk{width:36px;height:32px;font-size:18px}.brand small{display:block;font-size:8px}.brand{font-size:12px}.h-main{min-height:50px}}


/* Logo header override */
.logo-brand{
  display:flex;
  align-items:center;
  min-width:0;
  width:clamp(138px, 24vw, 270px);
  max-width:270px;
  height:48px;
  padding:0;
  overflow:hidden;
  line-height:0;
  text-transform:none;
  letter-spacing:0;
  text-shadow:none;
}
.logo-brand img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:left center;

  .logo-brand{width:clamp(118px, 31vw, 178px);height:42px}
  .h-main{grid-template-columns:auto minmax(70px,1fr) auto auto auto}

.h-main>.iconbtn{width:48px;height:48px;border-radius:13px;font-size:18px;}

@media(max-width:900px){

  write(key,val){try{localStorage.setItem(this.k[key],JSON.stringify(val));}catch(e){}}
};

  const stored = DB.read("loc",null);

  if(!stored){LOCS=SEED.slice();DB.write("loc",LOCS);}
  else if(storedVer!==SEED_VERSION){
    const byId={};stored.forEach(l=>byId[l.id]=l);

    DB.write("loc",LOCS);
  } else {LOCS=stored;}
  try{localStorage.setItem("f54_seedver",JSON.stringify(SEED_VERSION));}catch(e){}
})();

function miles(m){return (m/1609.34).toFixed(m<16093?1:0)+" mi";}
function km(m){return m<1000?Math.round(m)+" m":(m/1000).toFixed(1)+" km";}
function haversine(a,b){const R=6371000,d=x=>x*Math.PI/180,dLat=d(b.lat-a.lat),dLng=d(b.lng-a.lng),u=Math.sin(dLat/2)**2+Math.cos(d(a.lat))*Math.cos(d(b.lat))*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(u));}
function loc(id){return LOCS.find(l=>l.id===id)||ROUTE_EXTRA_STOPS[id]||null;}

/* ---------- Open/Closed status ---------- */
function openStatus(hours){
  if(!hours)return{open:null};
  const now=new Date();
  const day=now.getDay(); // 0=Sun
  const nowMin=now.getHours()*60+now.getMinutes();
  const DAY={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};
  const parseMin=str=>{
    const m=str.trim().match(/^(\d+)(?::(\d+))?([ap])/i);
    if(!m)return null;
    let h=parseInt(m[1]),min=parseInt(m[2]||"0");
    if(m[3].toLowerCase()==="p"&&h!==12)h+=12;
    if(m[3].toLowerCase()==="a"&&h===12)h=0;
    return h*60+min;
  };
  for(const seg of hours.split("\xb7")){
    const m=seg.trim().match(/^(\w{3,})(?:[–\-](\w{3,}))?\s+(.+?)[–\-](.+)$/i);
    if(!m)continue;
    const ds=DAY[m[1].toLowerCase().slice(0,3)],de=m[2]?DAY[m[2].toLowerCase().slice(0,3)]:ds;
    if(ds===undefined||de===undefined)continue;
    const inDay=ds<=de?(day>=ds&&day<=de):(day>=ds||day<=de);
    if(!inDay)continue;
    const open=parseMin(m[3]),close=parseMin(m[4]);
    if(open===null||close===null)continue;
    const closeAdj=close<=open?close+1440:close;
    return{open:nowMin>=open&&nowMin<=closeAdj,closes:m[4].trim()};
  }
  return{open:null};
}

/* ---------- Map init ---------- */
function initMap(){
  map=L.map("map",{zoomControl:false,attributionControl:true}).setView([35.5,-94.5],5);
  L.control.zoom({position:"bottomright"}).addTo(map);
  baseLayers.standard=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"});
  baseLayers.satellite=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Imagery &copy; Esri"});
  let satFellBack=false;
  baseLayers.satellite.on("tileerror",()=>{
    if(satFellBack)return;satFellBack=true;
    const was=map.hasLayer(baseLayers.satellite);
    map.removeLayer(baseLayers.satellite);
    baseLayers.satellite=L.tileLayer("https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/tile/{z}/{y}/{x}",{maxZoom:16,attribution:"Imagery &copy; USGS"});
    if(was)baseLayers.satellite.addTo(map);
    toast("Switched to USGS imagery (Esri unreachable)");
  });
  baseLayers.standard.addTo(map);
  roadsOverlay=L.layerGroup([
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,opacity:.9}),
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,opacity:.9})
  ]);
  clusterLayer=L.markerClusterGroup({
    maxClusterRadius:50,
    iconCreateFunction:cluster=>{
      const c=cluster.getChildCount();
      return L.divIcon({html:`<div style="background:var(--brass);color:#fff;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-weight:800;font-size:13px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">${c}</div>`,className:"",iconSize:[36,36]});
    },
    spiderfyOnMaxZoom:true,
    showCoverageOnHover:false,
    disableClusteringAtZoom:8
  });
  clusterLayer.addTo(map);
  renderMarkers();
}

function applyRoadsOverlay(){
  if(!roadsOverlay)return;
  if(activeBase==="satellite"&&roadsOn){roadsOverlay.addTo(map);roadsOverlay.eachLayer(l=>l.bringToFront());}
  else map.removeLayer(roadsOverlay);
  if(radarOn)RadarAnim.layers.forEach(l=>{if(map.hasLayer(l))l.bringToFront();});
}

function pinIcon(l){
  const fav="";
  const up=l.upcoming?" upcoming":"";
  // In All view, keep location pins neutral so the map doesn't look like
  // mixed holiday colors. Market colors still show when a market is selected.
  const bg = marketFilter === "ALL" ? "var(--brass)" : MK_COLOR[l.market];
  return L.divIcon({
    className:"",
    html:`<div class="pin${fav}${up}" style="background:${bg}"><span>${l.store}</span></div>`,
    iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-28]
  });
}

function visibleLocs(){
  return LOCS.filter(l=>{
    if(marketFilter!=="ALL"&&l.market!==marketFilter)return false;
    if(searchQ){
      const q=searchQ.toLowerCase();
      if(!(l.name.toLowerCase().includes(q)||l.store.includes(q)||(l.address||"").toLowerCase().includes(q)||MARKETS[l.market].toLowerCase().includes(q)||l.market.toLowerCase().includes(q)))return false;
    }
    return true;
  });
}

function renderMarkers(){
  clusterLayer.clearLayers();
  visibleLocs().forEach(l=>{
    const mk=L.marker([l.lat,l.lng],{icon:pinIcon(l)});
    mk.on("click",()=>openLocation(l.id));
    clusterLayer.addLayer(mk);
  });
}

/* ---------- Geolocation ---------- */
async function resolveCityName(coord){
  const key=`f54_city_${coord.lat.toFixed(2)}_${coord.lng.toFixed(2)}`;
  try{
    const cached=JSON.parse(localStorage.getItem(key)||"null");
    if(cached&&cached.label&&Date.now()-cached.ts<7*24*60*60*1000)return cached.label;
  }catch(e){}
  const clean=v=>(v||"").toString().trim();
  const save=label=>{try{localStorage.setItem(key,JSON.stringify({label,ts:Date.now()}));}catch(e){} return label;};
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${coord.lat.toFixed(6)}&longitude=${coord.lng.toFixed(6)}&localityLanguage=en`,{cache:"force-cache"});
    const d=await r.json();
    const city=clean(d.city)||clean(d.locality)||clean(d.principalSubdivision);
    const state=clean(d.principalSubdivisionCode)||clean(d.principalSubdivision);
    if(city)return save(state&&state!==city?`${city}, ${state}`:city);
  }catch(e){}
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${coord.lat.toFixed(6)}&lon=${coord.lng.toFixed(6)}&zoom=10&addressdetails=1`,{cache:"force-cache"});
    const d=await r.json();
    const a=d.address||{};
    const city=clean(a.city)||clean(a.town)||clean(a.village)||clean(a.municipality)||clean(a.county);
    const state=clean(a.state_code)||clean(a.state);
    if(city)return save(state&&state!==city?`${city}, ${state}`:city);
  }catch(e){}
  const nearest=LOCS.filter(x=>x.market!=="LAB").map(x=>({x,d:haversine(coord,x)})).sort((a,b)=>a.d-b.d)[0];
  return nearest?MARKETS[nearest.x.market]||"Near you":"Near you";
}
function locateMe(announce){
  if(!navigator.geolocation){toast("Location not available");return;}
  navigator.geolocation.getCurrentPosition(p=>{
    userPos={lat:p.coords.latitude,lng:p.coords.longitude};
    setUserTruckMarker(userPos);
    if(announce){map.setView([userPos.lat,userPos.lng],10);toast("Centered on your location");}
    resolveCityName(userPos).then(city=>updateBanner(userPos,city)).catch(()=>updateBanner(userPos,"Near you"));
    renderMarkers();renderFilters();
    if(selectedId)openLocation(selectedId);
  },()=>toast("Couldn't get location — check permissions"),{enableHighAccuracy:true,timeout:8000,maximumAge:60000});
}

/* ---------- Filters ---------- */
function renderFilters(){
  const wrap=$("#filterRow");
  const existingSearch=wrap.querySelector('.searchbox');
  wrap.innerHTML="";
  const addPill=(key,label,cls)=>{
    const p=el("button",cls||"pill"+(marketFilter===key?" on":""),label);
    p.onclick=()=>{
      marketFilter=key;
      distFilter=0;
      searchQ="";
      renderFilters();
      renderMarkers();
      setTimeout(()=>fitToMarket(key),0);
    };
    wrap.appendChild(p);
  };
  const total=LOCS.filter(l=>l.market!=="LAB").length;
  addPill("ALL",`All <span class="ct">${total}</span>`);
  Object.keys(MARKETS).filter(k=>k!=="LAB").forEach(k=>{
    const cnt=LOCS.filter(l=>l.market===k).length;
    addPill(k,`${k} <span class="ct">${cnt}</span>`);
  });
  if(existingSearch){
    wrap.appendChild(existingSearch);
  }else{
    const box=el('div','searchbox');
    box.innerHTML='<select id="locPicker" class="loc-select" aria-label="Choose location"><option value="">Choose location…</option></select>';
    wrap.appendChild(box);
  }
  renderLocationDropdown();
}

function fitToMarket(key){
  const v=LOCS.filter(l=>key==="ALL"?(l.market!=="LAB"):l.market===key);
  if(!v.length||!map)return;
  const b=L.latLngBounds(v.map(l=>[l.lat,l.lng]));
  map.fitBounds(b.pad(key==="ALL"?.18:.28));
}

function fitToVisible(){
  const v=visibleLocs().filter(l=>l.market!=="LAB"||marketFilter==="LAB");
  if(!v.length)return;
  map.fitBounds(L.latLngBounds(v.map(l=>[l.lat,l.lng])).pad(0.18));
}

/* ---------- Sheet / tabs ---------- */
function openSheet(){
  const s=$("#sheet");
  s.classList.add("open");
  // reset to info tab
  switchTab("info");
}
function closeSheet(){
  $("#sheet").classList.remove("open");
  selectedId=null;
  if(routeLayer&&!tripRoute){map.removeLayer(routeLayer);routeLayer=null;}
  if(nearbyPlacesLayer){map.removeLayer(nearbyPlacesLayer);nearbyPlacesLayer=null;}
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll(".stab").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.toggle("active",p.id==="tab"+cap(tab)));
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function openLocation(id){
  selectedId=id;
  const l=loc(id);
  if(!l)return;
  map.panTo([l.lat,l.lng]);
  renderSheetHead(l);
  renderInfoTab(l);
  renderActionsTab(l);
  renderNearbyTab(l);
  renderTravelTab(l);
  openSheet();
  if(userPos&&!tripRoute)previewStoreRoute(l,false);
}

function renderSheetHead(l){
  const st=openStatus(l.hours);
  let statusHtml="";
  if(l.upcoming){
    statusHtml=`<span class="open-pill unknown">Opening Nov 2026</span>`;
  } else if(l.hours&&st.open!==null){
    statusHtml=`<span class="open-pill ${st.open?"open":"closed"}">${st.open?"Open":"Closed"}${st.closes&&!st.open?` &middot; opens 11a`:""}${st.closes&&st.open?` until ${esc(st.closes)}`:""}</span>`;
  }
  const brandBadge=l.brand?`<span style="font-size:12px;font-weight:700;color:var(--info);font-family:var(--mono)">${esc(l.brand)}</span> ·`:"";
  $("#sheetHead").innerHTML=`
    <div class="titleline">
      <div>
        <h2>${esc(l.name)}</h2>
        <div class="sub">${brandBadge} <span class="mono">#${l.store}</span> · ${MARKETS[l.market]||l.market} ${statusHtml}</div>
      </div>
      <span class="badge ${l.upcoming?"upcoming":l.verified?"ok":"approx"}">${l.upcoming?"UPCOMING":l.verified?"VERIFIED":"APPROX"}</span>
    </div>`;
}

function navLinks(l){

    <a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=${q}" target="_blank" rel="noopener">Google</a>

function field(k,v,internal){
  const tag=internal?`<span class="internal-tag">INTERNAL</span>`:"";
  const val=v?v:`<span class="empty">Not set</span>`;
  return `<div class="field"><div class="k">${k}${tag}</div><div class="v">${val}</div></div>`;
}
function lastVisit(id){const a=HIST[id];return a&&a.length?a[a.length-1]:null;}
function shortTripStops(){
  return tripSel.map((id,i)=>{const l=loc(id);return l?`${i+1}. ${l.name}`:"";}).filter(Boolean).join(" → ");
}
function routeStopMeta(l){
  if(!l)return "";
  if(l.kind==="place")return `${esc(l.category||"Place")} · selected place`;
  return `${esc(MARKETS[l.market]||l.market||"Store")} · #${esc(l.store||l.id)}`;
}
function routePlaceId(p){
  const base=`${p.name||"place"}_${Number(p.lat).toFixed(5)}_${Number(p.lng).toFixed(5)}`;
  return "rp_"+base.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,80);
}
function registerRouteSearchPlace(p,cat){
  const id=routePlaceId(p);
  const addr=(p.tags&&p.tags.formatted)||[p.tags&&p.tags["addr:housenumber"],p.tags&&p.tags["addr:street"],p.tags&&p.tags["addr:city"],p.tags&&p.tags["addr:state"]].filter(Boolean).join(" ");
  ROUTE_SEARCH_RESULTS[id]=Object.assign({},p,{id,kind:"place",category:cat.label,market:"PLACE",store:"",address:addr,phone:(p.tags&&p.tags.phone)||(p.tags&&p.tags["contact:phone"])||""});
  return id;
}
function insertIndexForPlace(p){
  if(!tripRoute||!tripRoute.coords||!tripRoute.pts||tripRoute.pts.length<2)return tripSel.length;
  const along=Number.isFinite(p.along)?p.along:pointRouteProjection(p,tripRoute.coords).along;
  const count=tripRoute.pts.filter(stop=>pointRouteProjection(stop,tripRoute.coords).along<=along+50).length;
  return Math.max(1,Math.min(tripSel.length,count));
}
async function addSearchedPlaceToRoute(placeId,sourceBox){
  const p=ROUTE_SEARCH_RESULTS[placeId]||ROUTE_EXTRA_STOPS[placeId];
  if(!p){toast("That place is no longer available. Search again.");return;}
  if(tripSel.includes(placeId)){toast(`${p.name} is already in the route`);return;}
  ROUTE_EXTRA_STOPS[placeId]=p;
  const insertAt=insertIndexForPlace(p);
  tripSel.splice(insertAt,0,placeId);
  tripRoute=null;
  document.querySelectorAll(`[data-route-place-add="${placeId}"]`).forEach(b=>{b.disabled=true;b.textContent="Added";});
  toast(`Added ${p.name} to route`);
  await buildTrip(null,{fit:false});
  refreshSelectedStoreRouteUI();
  const genOpen=$("#genModal")&&$("#genModal").classList.contains("open");
  if(genOpen&&sourceBox){showTrip($("#genInner"));}
}

async function addStoreToTrip(id,mode){
  const l=loc(id);
  if(!l)return;
  if(mode==="start"){
    tripSel=[id];
    tripRoute=null;
    clearTripRouteMap(true);
    toast(`Started route at ${l.name}`);
    if(userPos)previewStoreRoute(l,true);
    else showStorePreviewHud(l,null,"Enable location to show the route from you.");
  } else if(!tripSel.length){
    tripSel=[id];
    tripRoute=null;
    clearTripRouteMap(true);
    toast(`Started route at ${l.name}`);
    if(userPos)previewStoreRoute(l,false);
  } else if(!tripSel.includes(id)){
    tripSel.push(id);
    tripRoute=null;
    clearTripRouteMap(false);
    toast(`Added ${l.name} to route`);
  } else {
    toast(`${l.name} is already in the route`);
  }
  refreshSelectedStoreRouteUI();
  if(tripSel.length>=2){
    try{await buildTrip(null,{fit:false});}catch(e){}
    refreshSelectedStoreRouteUI();
  }
}
async function buildTripFromStore(){
  if(tripSel.length<2){toast("Add at least two stops to build a route");return;}

  if(tripRoute)closeSheet();
}
function wireStoreRouteActions(container,l){
  container.querySelectorAll("[data-store-route]").forEach(btn=>btn.onclick=()=>{
    const action=btn.dataset.storeRoute;
    const id=btn.dataset.storeId;
    if(action==="start")addStoreToTrip(id,"start");
    else if(action==="add")addStoreToTrip(id,"add");
    else if(action==="build")buildTripFromStore();
    else if(action==="open")openGen("Trip planner",showTrip);
    else if(action==="clear"){tripSel=[];tripRoute=null;ROUTE_EXTRA_STOPS={};ROUTE_SEARCH_RESULTS={};clearTripRouteMap(true);toast("Route cleared");refreshSelectedStoreRouteUI();}
  });
  container.querySelectorAll("[data-store-route-pick]").forEach(sel=>sel.onchange=e=>{
    if(!e.target.value)return;
    if(!tripSel.includes(l.id))tripSel=[l.id];
    addStoreToTrip(e.target.value,"add");
  });
}

function updateInlineTravelStats(l){
  const dist=$("#iDist"), drive=$("#iDrive"), distLbl=$("#iDistLbl"), driveLbl=$("#iDriveLbl");

  if(tripRoute){
    const mins=Math.round(tripRoute.duration/60);

    drive.textContent=mins>=60?Math.floor(mins/60)+"h "+(mins%60)+"m":mins+" min";
    if(distLbl)distLbl.textContent="Route miles";
    if(driveLbl)driveLbl.textContent="Route time";
    return;
  }
  if(tripSel.includes(l.id)){
    dist.textContent="In route";
    drive.textContent=tripSel.length>=2?"Ready":"Add stop";
    if(distLbl)distLbl.textContent="Selected";
    if(driveLbl)driveLbl.textContent="Status";
    return;
  }
  if(userPos){

    if(driveLbl)driveLbl.textContent="Drive time";

    if(distLbl)distLbl.textContent="From you";
    if(driveLbl)driveLbl.textContent="Drive time";
  }
}

function makeDragScroll(scroller){
  if(!scroller)return;
  let down=false,startX=0,left=0;
  scroller.addEventListener("pointerdown",e=>{down=true;startX=e.clientX;left=scroller.scrollLeft;scroller.setPointerCapture&&scroller.setPointerCapture(e.pointerId);scroller.classList.add("dragging");});
  scroller.addEventListener("pointermove",e=>{if(!down)return;const dx=e.clientX-startX;if(Math.abs(dx)>3)e.preventDefault();scroller.scrollLeft=left-dx;});
  const up=()=>{down=false;scroller.classList.remove("dragging");};
  scroller.addEventListener("pointerup",up);scroller.addEventListener("pointercancel",up);scroller.addEventListener("mouseleave",up);
}

async function overpass(query){
  const eps=["https://overpass-api.de/api/interpreter","https://overpass.kumi.systems/api/interpreter","https://overpass.private.coffee/api/interpreter","https://maps.mail.ru/osm/tools/overpass/api/interpreter","https://overpass.osm.ch/api/interpreter"];
  let lastErr=null;
  for(const ep of eps){
    try{
      const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),20000);
      const r=await fetch(ep+"?data="+encodeURIComponent(query),{signal:ctrl.signal});
      clearTimeout(to);if(r.ok)return await r.json();lastErr="HTTP "+r.status;
    }catch(e){lastErr=e&&e.name==="AbortError"?"timeout":"network";}
  }
  throw new Error(lastErr||"all overpass endpoints unreachable");
}
async function geoapifyPlacesNear(cat,center,radiusMeters,limit,categoriesOverride){
  const key=geoapifyKey();
  const categories=categoriesOverride||cat.geo;
  if(!key||!categories)throw new Error("missing Geoapify key");
  const nameParam=cat.name?`&name=${encodeURIComponent(cat.name)}`:"";
  const url=`https://api.geoapify.com/v2/places?categories=${encodeURIComponent(categories)}&filter=circle:${center.lng.toFixed(6)},${center.lat.toFixed(6)},${Math.round(radiusMeters)}&bias=proximity:${center.lng.toFixed(6)},${center.lat.toFixed(6)}&limit=${limit||24}&lang=en${nameParam}&apiKey=${encodeURIComponent(key)}`;
  const r=await fetch(url);
  const d=await r.json();
  if(!r.ok||d.error)throw new Error((d&&d.message)||`Geoapify places HTTP ${r.status}`);
  return (d.features||[]).map(f=>geoapifyFeatureToPlace(f,cat)).filter(Boolean);
}
function geoapifyFeatureToPlace(f,cat){
  const pr=f.properties||{};
  const coords=f.geometry&&f.geometry.coordinates;
  const lng=coords&&coords.length>=2?coords[0]:pr.lon;
  const lat=coords&&coords.length>=2?coords[1]:pr.lat;
  if(lat==null||lng==null)return null;
  return {
    name:pr.name||pr.address_line1||cat.label,
    lat:+lat,lng:+lng,source:"Route",
    tags:{
      phone:(pr.contact&&pr.contact.phone)||pr.phone||"",
      website:(pr.contact&&pr.contact.website)||pr.website||"",
      formatted:pr.formatted||pr.address_line2||"",
      "addr:housenumber":pr.housenumber||"",
      "addr:street":pr.street||"",
      "addr:city":pr.city||"",
      "addr:state":pr.state||"",
      categories:pr.categories||[]
    }
  };
}
function fsqQueryForCat(cat){
  return ({coffee:"coffee",food:"restaurant",gas:"gas station",hotel:"hotel",hilton:"Hilton hotel",pharm:"pharmacy",grocery:"grocery",bar:"bar",night:"nightlife",fun:"entertainment",car:"car rental",park:"parking",air:"airport"}[cat.key]||cat.label||"places");
}
async function foursquarePlacesNear(cat,center,radiusMeters,limit){
  const key=foursquareKey();
  if(!key)throw new Error("missing Foursquare key");
  const params=new URLSearchParams({ll:`${center.lat.toFixed(6)},${center.lng.toFixed(6)}`,query:fsqQueryForCat(cat),radius:String(Math.round(radiusMeters)),limit:String(limit||24),sort:"DISTANCE"});
  const r=await fetch(`https://api.foursquare.com/v3/places/search?${params.toString()}`,{headers:{Authorization:key,Accept:"application/json"}});
  const d=await r.json();
  if(!r.ok)throw new Error((d&&d.message)||`Foursquare HTTP ${r.status}`);
  return (d.results||[]).map(x=>foursquarePlaceToPlace(x,cat)).filter(Boolean);
}
function foursquarePlaceToPlace(x,cat){
  const g=x.geocodes&&x.geocodes.main;
  if(!g||g.latitude==null||g.longitude==null)return null;
  const loc=x.location||{};
  return {name:x.name||cat.label,lat:+g.latitude,lng:+g.longitude,source:"Places",tags:{phone:x.tel||"",website:x.website||"",formatted:loc.formatted_address||[loc.address,loc.locality,loc.region].filter(Boolean).join(", "),categories:(x.categories||[]).map(c=>c.name)}};
}
async function foursquarePlacesAlongRoute(cat,pts,radiusMeters,progress){
  const all=[], seen=new Set();
  const maxPts=14;
  const usePts=pts.length>maxPts?pts.filter((_,i)=>i===0||i===pts.length-1||i%Math.ceil(pts.length/maxPts)===0).slice(0,maxPts):pts;
  for(let i=0;i<usePts.length;i++){
    if(progress)progress(`Searching route area ${i+1} of ${usePts.length}…`);
    const found=await foursquarePlacesNear(cat,usePts[i],radiusMeters,18);
    found.forEach(p=>{const key=`${p.name}_${p.lat.toFixed(5)}_${p.lng.toFixed(5)}`;if(!seen.has(key)){seen.add(key);all.push(p);}});
  }
  return all;
}
async function loadNearby(id,cat,targetEl){
  const l=loc(id);

  if(!placesEl||!l)return;
  const rad=cat.rad||5000;
  if(!hasFoursquare()&&!hasGeoapify()&&!cat.forceOsm){
    placesEl.innerHTML=`<div class="hint"><b>${esc(cat.label)} near ${esc(l.name)}</b><br>Open Maps for the fastest nearby results, or run the in-app search here.<br><br><a class="tinybtn primary" href="${mapsSearchLink(l,cat.label)}" target="_blank" rel="noopener">Open in Maps</a> <button class="tinybtn" id="nearbyTryOsm">Search here</button></div>`;
    const osm=placesEl.querySelector("#nearbyTryOsm");if(osm)osm.onclick=()=>loadNearby(id,Object.assign({},cat,{forceOsm:true}),placesEl);
    return;
  }
  placesEl.innerHTML=`<div class="hint"><span class="spin"></span>Searching ${cat.label.toLowerCase()} near ${esc(l.name)}…</div>`;
  try{
    let items=[];let provider="OpenStreetMap";let fallbackMsg="";

      try{

      }catch(fsqErr){console.warn("Nearby search failed",fsqErr);fallbackMsg="";items=[];}

        if(!raw.length&&cat.geoBroad)raw=await geoapifyPlacesNear(cat,l,Math.round(rad*1.4),24,cat.geoBroad);
        items=raw.map(p=>Object.assign({},p,{dist:haversine(l,{lat:p.lat,lng:p.lng})}));
        provider="Geoapify";
      }catch(geoErr){console.warn("Nearby search failed",geoErr);fallbackMsg+="";items=[];}
    }
    if(!items.length&&cat.forceOsm){
      const parts=cat.q.split(";").map(p=>`${p}(around:${rad},${l.lat},${l.lng});`).join("");

      items=(data.elements||[]).map(e=>{

        if(la==null||ln==null)return null;
        return{name:(e.tags&&e.tags.name)||cat.label,lat:la,lng:ln,dist:haversine(l,{lat:la,lng:ln}),tags:e.tags||{},source:"Places"};
      }).filter(Boolean);

    }
    if(selectedId&&selectedId!==id)return;

    if(!items.length){

      placesEl.innerHTML=`<div class="hint">No ${cat.label.toLowerCase()} found within ${km(rad)} from ${esc(l.name)}. <br><br><a class="tinybtn primary" href="${mapsSearchLink(l,cat.label)}" target="_blank" rel="noopener">Open in Maps</a>${cat.forceOsm?"":` <button class="tinybtn" id="nearbyTryOsm2">Search here</button>`}${broader}</div>`;
      const widen=placesEl.querySelector("#nearbyWiden");
      if(widen)widen.onclick=()=>loadNearby(id,Object.assign({},cat,{rad:rad*2}),placesEl);
      const osm2=placesEl.querySelector("#nearbyTryOsm2");
      if(osm2)osm2.onclick=()=>loadNearby(id,Object.assign({},cat,{forceOsm:true}),placesEl);
      return;
    }
    if(nearbyPlacesLayer){map.removeLayer(nearbyPlacesLayer);nearbyPlacesLayer=null;}
    nearbyPlacesLayer=L.layerGroup(items.slice(0,16).map(p=>{
      const marker=L.marker([p.lat,p.lng],{
        icon:L.divIcon({className:"",html:`<div class="route-place-pin">${cat.label.charAt(0)}</div>`,iconSize:[26,26],iconAnchor:[13,13]})
      }).bindTooltip(`${p.name} · ${miles(p.dist)} away`,{direction:"top",offset:[0,-10]});
      marker.bindPopup(`<div class="route-popup"><b>${esc(p.name)}</b><div class="meta">${miles(p.dist)} from ${esc(l.name)}</div><button class="tinybtn primary" data-nearby-add-popup>Add to route</button></div>`);
      marker.on("popupopen",e=>{
        const b=e.popup.getElement().querySelector("[data-nearby-add-popup]");

    const bounds=L.latLngBounds([[l.lat,l.lng],...items.slice(0,8).map(p=>[p.lat,p.lng])]);
    if(bounds.isValid())map.fitBounds(bounds.pad(.22));
    const scroll=el("div","placescroll");
    items.forEach(p=>{

      const addr=(p.tags&&p.tags.formatted)||[p.tags&&p.tags["addr:housenumber"],p.tags&&p.tags["addr:street"]].filter(Boolean).join(" ");

        <div class="meta">${miles(p.dist)} away${addr?`<br>${esc(addr)}`:""}${phone?` · <a href="tel:${esc(phone)}">call</a>`:""}</div></div>
        <div class="place-actions"><button class="addroute" data-nearby-add="${esc(`${p.lat},${p.lng}`)}">Add to route</button><a class="go" href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}" target="_blank" rel="noopener">Directions</a></div>`;
      card.querySelector("[data-nearby-add]").onclick=()=>addNearbyPlaceToRoute(p,cat);

    placesEl.innerHTML=`<div class="route-search-progress">Found ${items.length} ${cat.label.toLowerCase()} option${items.length===1?"":"s"}. Pins are now on the map. Use <b>Add to route</b> to make one a numbered route stop.</div>`;

    const retry=placesEl.querySelector("#nearbyRetry");
    if(retry)retry.onclick=()=>loadNearby(id,cat,placesEl);
  }
}
function addNearbyPlaceToRoute(p,cat){
  if(!tripSel.length&&selectedId&&loc(selectedId))tripSel.push(selectedId);
  const proj=tripRoute?pointRouteProjection({lat:p.lat,lng:p.lng},tripRoute.coords):null;
  const rid=registerRouteSearchPlace(Object.assign({},p,{off:proj?proj.dist:0,along:proj?proj.along:0,part:proj?routePartName(proj.pct):"nearby",pct:proj?proj.pct:0}),cat);
  if(tripSel.includes(rid)){toast(`${p.name} is already in the route`);return;}
  ROUTE_EXTRA_STOPS[rid]=ROUTE_SEARCH_RESULTS[rid];
  if(tripRoute){tripSel.splice(insertIndexForPlace(ROUTE_EXTRA_STOPS[rid]),0,rid);}
  else tripSel.push(rid);
  tripRoute=null;
  toast(`${p.name} added to route`);
  if(tripSel.length>=2)buildTrip(null,{fit:false});else showRouteHud();
  refreshSelectedStoreRouteUI();
}

/* ---------- Animated radar ---------- */
const RADAR_ATTR = 'Radar &copy; <a href="https://www.rainviewer.com/">RainViewer</a>';
const RadarAnim={
  frames:[],layers:[],i:0,timer:null,host:"",tileWatch:null,loading:false,lastLoaded:0,

  reset(){
    clearInterval(this.timer);this.timer=null;
    clearTimeout(this.tileWatch);this.tileWatch=null;
    this.layers.forEach(l=>{try{if(map&&map.hasLayer(l))map.removeLayer(l);}catch(e){}});
    this.frames=[];this.layers=[];this.i=0;this.host="";this.lastLoaded=0;this.loading=false;
  },

  async load(force=false){
    // RainViewer updates about every 10 minutes. Keep a short cache so toggling radar is instant,
    // but force a refresh when the user taps Reload.
    if(!force && this.frames.length && Date.now()-this.lastLoaded < 10*60*1000)return true;
    if(this.loading)return false;
    this.loading=true;
    try{
      this.stop(true);
      this.frames=[];this.layers=[];
      const r=await fetch("https://api.rainviewer.com/public/weather-maps.json?ts="+Date.now(),{cache:"no-store"});
      if(!r.ok)throw new Error("HTTP "+r.status);
      const d=await r.json();
      this.host=d.host||"https://tilecache.rainviewer.com";
      const past=(d.radar&&Array.isArray(d.radar.past)?d.radar.past:[]);
      const fc=(d.radar&&Array.isArray(d.radar.nowcast)?d.radar.nowcast:[]);
      // Keep past first, then forecast, but ignore malformed frames.
      this.frames=past.concat(fc).filter(f=>f&&f.path&&f.time);
      if(!this.frames.length)throw new Error("No radar frames returned");

      this.layers=this.frames.map(f=>{
        const url=`${this.host}${f.path}/256/{z}/{x}/{y}/4/1_1.png`;
        return L.tileLayer(url,{
          opacity:0,
          zIndex:650,
          attribution:RADAR_ATTR,
          tileSize:256,
          // RainViewer radar tiles are only native through zoom 7. Leaflet must reuse/scale
          // those tiles at city zooms, otherwise the app requests z9/z10 tiles that do not exist.
          maxNativeZoom:7,
          maxZoom:19,
          minZoom:0,
          updateWhenIdle:true,
          updateWhenZooming:false,
          keepBuffer:2,
          crossOrigin:true
        });
      });
      this.lastLoaded=Date.now();
      return true;
    }catch(e){
      console.warn("Radar load failed",e);
      this.reset();
      return false;
    }finally{
      this.loading=false;
    }
  },

  start(){
    if(!this.layers.length)return false;
    clearInterval(this.timer);
    this.layers.forEach(l=>{if(!map.hasLayer(l))l.addTo(map);});
    this.i=Math.max(0,this.frames.length-1);
    this.show(this.i);
    this.watchTiles();
    this.timer=setInterval(()=>{if(!radarPaused){this.i=(this.i+1)%this.frames.length;this.show(this.i);}},850);
    const play=$("#radarPlayBtn");
    if(play){play.hidden=false;play.textContent="⏸";}
    return true;
  },

  show(idx){
    if(!this.layers[idx])return;
    this.layers.forEach((l,k)=>l.setOpacity(k===idx?0.72:0));
    try{this.layers[idx].bringToFront();}catch(e){}
    const f=this.frames[idx],dt=new Date(f.time*1000),isF=f.time*1000>Date.now()+60*1000;
    const clk=$("#radarClock");
    if(clk){
      clk.hidden=false;
      clk.innerHTML=`${isF?"<b>FCST</b> ":"radar "}${dt.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}`;
    }
  },

  watchTiles(){
    clearTimeout(this.tileWatch);
    const active=this.layers[this.i];
    if(!active)return;
    let loaded=false;
    const onLoad=()=>{loaded=true;cleanup();};
    const cleanup=()=>{
      active.off("load",onLoad);
      active.off("tileerror",onErr);
      clearTimeout(this.tileWatch);this.tileWatch=null;
    };
    const onErr=()=>{
      // A few tile errors are normal outside radar coverage; don't turn the whole layer off.
      const clk=$("#radarClock");
      if(clk&&!loaded)clk.innerHTML="radar loading…";
    };
    active.on("load",onLoad);
    active.on("tileerror",onErr);
    this.tileWatch=setTimeout(()=>{
      cleanup();
      if(!loaded && radarOn){
        const clk=$("#radarClock");
        if(clk){clk.hidden=false;clk.innerHTML="radar unavailable here";}
      }
    },9000);
  },

  stop(clearLayers=true){
    clearInterval(this.timer);this.timer=null;
    clearTimeout(this.tileWatch);this.tileWatch=null;
    if(clearLayers)this.layers.forEach(l=>{if(map.hasLayer(l))map.removeLayer(l);});
    const clk=$("#radarClock");if(clk)clk.hidden=true;
    const play=$("#radarPlayBtn");if(play)play.hidden=true;
    radarPaused=false;
  }
};

function runDiagnostics(box){
  const host=u=>u.replace(/^https:\/\//,"").split("/")[0];
  const tests=[
    {name:"Standard map tiles",type:"img",url:"https://a.tile.openstreetmap.org/5/8/12.png"},
    {name:"Satellite — Esri",type:"img",url:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/5/12/8"},
    {name:"Satellite — USGS",type:"img",url:"https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/tile/5/12/8"},
    {name:"Weather radar metadata",type:"fetch",url:"https://api.rainviewer.com/public/weather-maps.json"},
    {name:"Nearby search",type:"fetch",url:"https://overpass-api.de/api/interpreter?data=%5Bout%3Ajson%5D%3Bout%201%3B"},
    {name:"Drive times / routing",type:"fetch",url:"https://router.project-osrm.org/route/v1/driving/-94.5,39;-94.6,39?overview=false"},
    {name:"Weather forecast",type:"fetch",url:"https://api.open-meteo.com/v1/forecast?latitude=39&longitude=-94&current=temperature_2m"}
  ];
  box.innerHTML="";
  tests.forEach(t=>{
    const row=el("div","listitem");
    row.innerHTML=`<div class="info"><div class="nm">${t.name}</div><div class="sm mono">${host(t.url)}</div></div><div class="diag mono" style="font-weight:700;color:var(--muted)"><span class="spin"></span></div>`;
    box.appendChild(row);
    const mark=ok=>{const c=row.querySelector(".diag");c.innerHTML=ok?"✓ reachable":"✗ blocked";c.style.color=ok?"var(--live)":"var(--alert)";};
    if(t.type==="img"){
      const img=new Image();let done=false;
      const to=setTimeout(()=>{if(!done){done=true;mark(false);}},7000);
      const fin=ok=>{if(!done){done=true;clearTimeout(to);mark(ok);}};
      img.onload=()=>fin(true);img.onerror=()=>fin(false);
      img.src=t.url+(t.url.includes("?")?"&":"?")+"_="+Date.now();
    }else{
      const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),8000);
      fetch(t.url,{signal:ctrl.signal}).then(r=>{clearTimeout(to);mark(r.ok);}).catch(()=>{clearTimeout(to);mark(false);});
    }
  });
}

async function geoapifyRoute(pts){
  const key=geoapifyKey();
  if(!key)throw new Error("missing Geoapify key");
  const waypoints=pts.map(p=>`${p.lat},${p.lng}`).join("|");
  const url=`https://api.geoapify.com/v1/routing?waypoints=${encodeURIComponent(waypoints)}&mode=drive&format=geojson&apiKey=${encodeURIComponent(key)}`;
  const r=await fetch(url);
  const d=await r.json();
  if(!r.ok||d.error)throw new Error((d&&d.message)||`Geoapify routing HTTP ${r.status}`);
  const f=d.features&&d.features[0];
  if(!f||!f.geometry)throw new Error("No Geoapify route returned");
  let raw=[];
  if(f.geometry.type==="LineString")raw=f.geometry.coordinates;
  else if(f.geometry.type==="MultiLineString")raw=f.geometry.coordinates.flat();
  if(!raw.length)throw new Error("Geoapify route has no geometry");
  const coords=raw.map(c=>({lng:c[0],lat:c[1]}));
  const props=f.properties||{};
  const legs=Array.isArray(props.legs)?props.legs:[];
  const distance=Number(props.distance)||Number(props.summary&&props.summary.distance)||legs.reduce((s,l)=>s+(Number(l.distance)||0),0)||0;
  const duration=Number(props.time)||Number(props.duration)||Number(props.summary&&props.summary.duration)||legs.reduce((s,l)=>s+(Number(l.time)||Number(l.duration)||0),0)||0;
  return {coords,distance,duration,geometry:{type:"LineString",coordinates:coords.map(c=>[c.lng,c.lat])},source:"Route"};
}
async function osrmRoute(pts){
  const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${pts.map(p=>`${p.lng},${p.lat}`).join(";")}?overview=full&geometries=geojson`);
  const d=await r.json();const rt=d.routes&&d.routes[0];
  if(!rt||!rt.geometry)throw new Error("Route unavailable");
  const coords=rt.geometry.coordinates.map(c=>({lng:c[0],lat:c[1]}));
  return {coords,distance:rt.distance,duration:rt.duration,geometry:rt.geometry,source:"Route"};
}
async function buildTrip(out,opts={}){
  const hasOut=!!out;
  if(tripSel.length<2){if(hasOut)out.innerHTML='<div class="hint">Add at least two stops.</div>';else toast("Add at least two stops.");return;}

  if(pts.length<2){if(hasOut)out.innerHTML='<div class="hint">Add at least two valid stops.</div>';else toast("Add at least two valid stops.");return;}

    let rt;
    try{rt=hasGeoapify()?await geoapifyRoute(pts):await osrmRoute(pts);}
    catch(primaryErr){
      if(hasGeoapify()){console.warn("Geoapify routing failed; falling back to OSRM",primaryErr);rt=await osrmRoute(pts);rt.source="Route";}
      else throw primaryErr;
    }
    tripRoute={pts,coords:rt.coords,distance:rt.distance,duration:rt.duration,geometry:rt.geometry,source:rt.source};

}

function routePointAtPct(coords,pct){
  if(!coords||!coords.length)return null;
  if(pct<=0)return coords[0];
  if(pct>=1)return coords[coords.length-1];
  let total=0;
  const segs=[];
  for(let i=1;i<coords.length;i++){const d=haversine(coords[i-1],coords[i]);segs.push(d);total+=d;}
  const target=total*pct;
  let acc=0;
  for(let i=1;i<coords.length;i++){
    const d=segs[i-1]||0;
    if(acc+d>=target){
      const t=d?((target-acc)/d):0;
      return {lat:coords[i-1].lat+(coords[i].lat-coords[i-1].lat)*t,lng:coords[i-1].lng+(coords[i].lng-coords[i-1].lng)*t};
    }
    acc+=d;
  }
  return coords[coords.length-1];
}
function formatOffset(seconds){
  const mins=Math.round(seconds/60);
  if(mins<=5)return "now";
  if(mins<60)return `+${mins}m`;
  return `+${Math.floor(mins/60)}h ${mins%60?mins%60+"m":""}`.trim();
}
function routeWeatherPoints(){
  if(!tripRoute||!tripRoute.coords||!tripRoute.coords.length)return [];
  const last=tripRoute.pts[tripRoute.pts.length-1];
  return [
    {label:"Start",pct:0,point:routePointAtPct(tripRoute.coords,0),etaSec:0,stop:tripRoute.pts[0]},
    {label:"Mid route",pct:.5,point:routePointAtPct(tripRoute.coords,.5),etaSec:(tripRoute.duration||0)*.5,stop:null},
    {label:"Arrival",pct:1,point:routePointAtPct(tripRoute.coords,1),etaSec:tripRoute.duration||0,stop:last}
  ].filter(x=>x.point);
}
function nearestHourlySample(hourly,targetMs){
  const times=hourly&&hourly.time;if(!times||!times.length)return null;
  let best=0,bestDiff=Infinity;
  for(let i=0;i<times.length;i++){
    const ms=Number(times[i])*1000;
    const diff=Math.abs(ms-targetMs);
    if(diff<bestDiff){best=i;bestDiff=diff;}
  }
  return {
    temp:hourly.temperature_2m&&hourly.temperature_2m[best],
    code:hourly.weather_code&&hourly.weather_code[best],
    pop:hourly.precipitation_probability&&hourly.precipitation_probability[best],
    wind:hourly.wind_speed_10m&&hourly.wind_speed_10m[best],
    gust:hourly.wind_gusts_10m&&hourly.wind_gusts_10m[best],
    time:Number(times[best])*1000
  };
}
function routeWxRisk(sample){
  const code=Number(sample.code), pop=Number(sample.pop)||0, wind=Number(sample.wind)||0, gust=Number(sample.gust)||0;
  if(code>=95)return {level:"bad",label:"storms"};
  if(code>=71&&code<=77)return {level:"bad",label:"snow"};
  if(gust>=40||wind>=30)return {level:"bad",label:"high wind"};
  if((code>=61&&code<=67)||(code>=80&&code<=82))return {level:"warn",label:"rain"};
  if(pop>=60)return {level:"warn",label:"rain chance"};
  if(gust>=30||wind>=22)return {level:"warn",label:"windy"};
  return {level:"ok",label:"clear"};
}
async function fetchOpenMeteoRoutePoint(cp){
  const etaMs=Date.now()+Math.round(cp.etaSec||0)*1000;
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${cp.point.lat.toFixed(5)}&longitude=${cp.point.lng.toFixed(5)}&hourly=temperature_2m,precipitation_probability,weather_code,wind_speed_10m,wind_gusts_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=GMT&timeformat=unixtime&forecast_days=2`;
  const r=await fetch(u,{cache:"no-store"});
  const d=await r.json();
  if(!r.ok||d.error)throw new Error((d&&d.reason)||`Weather HTTP ${r.status}`);
  const sample=nearestHourlySample(d.hourly,etaMs);
  if(!sample)throw new Error("No forecast hours returned");
  const risk=routeWxRisk(sample);
  return Object.assign({},cp,{sample,risk,etaLabel:formatOffset(cp.etaSec||0),wx:wxText(Number(sample.code))});
}
function routeWeatherSummaryText(items){
  if(!items||!items.length)return "Weather unavailable.";
  const bad=items.find(i=>i.risk.level==="bad");
  const warn=items.find(i=>i.risk.level==="warn");
  if(bad)return `Watch ${bad.risk.label} near ${bad.label.toLowerCase()} (${bad.etaLabel}).`;
  if(warn)return `Heads up: ${warn.risk.label} near ${warn.label.toLowerCase()} (${warn.etaLabel}).`;
  return "No major weather issues flagged along this route.";
}
async function loadRouteWeather(force=false){
  if(!tripRoute)throw new Error("Build a route first");
  if(ROUTE_WEATHER_CACHE&&!force)return ROUTE_WEATHER_CACHE;
  if(ROUTE_WEATHER_LOADING&&!force)return null;
  const run=++ROUTE_WEATHER_RUN;
  ROUTE_WEATHER_LOADING=true;ROUTE_WEATHER_ERROR="";updateRouteWeatherPanels();
  try{
    const cps=routeWeatherPoints();
    const items=[];
    for(const cp of cps){items.push(await fetchOpenMeteoRoutePoint(cp));}
    if(run!==ROUTE_WEATHER_RUN)return ROUTE_WEATHER_CACHE;
    ROUTE_WEATHER_CACHE={items,summary:routeWeatherSummaryText(items),updated:Date.now(),source:"Weather"};
    ROUTE_WEATHER_LOADING=false;updateRouteWeatherPanels();return ROUTE_WEATHER_CACHE;
  }catch(e){
    if(run===ROUTE_WEATHER_RUN){ROUTE_WEATHER_ERROR=e.message||"Weather unavailable";ROUTE_WEATHER_LOADING=false;updateRouteWeatherPanels();}
    throw e;
  }
}
function routeWeatherHTML(cache){
